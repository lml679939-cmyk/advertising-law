    const TOTAL = activeQuestions.length;
    const MC_TOTAL = activeMCQuestions.length;

    /* ─── 隨機排序 ─── */
    function toggleShuffle() {
      shuffleEnabled = !shuffleEnabled;
      document.getElementById('btn-shuffle').classList.toggle('active', shuffleEnabled);
      resetAll();
    }
    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    /* ─── 切換模式 ─── */
    function switchMode(mode) {
      if (currentMode === mode) return;
      currentMode = mode;
      document.getElementById('btn-mode-learn').classList.toggle('active', mode === 'learn');
      document.getElementById('btn-mode-classic').classList.toggle('active', mode === 'classic');
      document.getElementById('btn-mode-mc').classList.toggle('active', mode === 'mc');
      document.getElementById('btn-mode-fill').classList.toggle('active', mode === 'fill');
      document.getElementById('btn-mode-map').classList.toggle('active', mode === 'map');
      document.getElementById('btn-mode-story').classList.toggle('active', mode === 'story');

      // 劇情模式：顯示 story-panel，隱藏其他主要 UI
      const isStory = mode === 'story';

      if (isStory) {

      }

      }

      const desc = document.getElementById('mode-desc');
      const headerSub = document.getElementById('header-sub');

      if (mode === 'learn') {
        document.getElementById('total-count').textContent = TOTAL;
        desc.textContent = '答題後立即顯示對錯與詳解，隨時掌握學習進度';
        headerSub.innerHTML = '選擇答案後，<strong>立即顯示對錯與詳解</strong>・不確定可標記「🎲 猜的」・每題可新增個人筆記';
        btnCheck.style.display = 'none';
        document.getElementById('correct-stat').style.display = '';
        document.getElementById('wrong-stat').style.display = '';
      } else if (mode === 'classic') {
        document.getElementById('total-count').textContent = TOTAL;
        desc.textContent = '作答完所有題目後，點「對答案」一次看完所有結果與詳解';
        headerSub.innerHTML = '選擇 ○（正確）或 ✕（錯誤）・不確定時可點「🎲 猜的」標記・作答後點<strong>「✅ 對答案」</strong>查看結果';
        btnCheck.style.display = '';
        document.getElementById('correct-stat').style.display = 'none';
        document.getElementById('wrong-stat').style.display = 'none';
      } else if (mode === 'mc') {
        document.getElementById('total-count').textContent = MC_TOTAL;
        desc.textContent = '共 ' + MC_TOTAL + ' 題四選一，融會貫通易混淆觀念・答題後立即顯示詳解';
        headerSub.innerHTML = '從判斷題中精選<strong>最容易混淆的觀念</strong>，製成四選一選擇題・答題後<strong>立即顯示正確答案與詳解</strong>';
        btnCheck.style.display = 'none';
        document.getElementById('correct-stat').style.display = '';
        document.getElementById('wrong-stat').style.display = '';
      } else { // fill
        document.getElementById('total-count').textContent = FILL_TOTAL;
        desc.textContent = '填入關鍵數字與詞彙，強化法條細節記憶・答對才算完成';
        headerSub.innerHTML = '從法條中挖空<strong>最容易記錯的數字與關鍵詞</strong>・輸入答案後按「✅ 確認答案」・<strong>答對才算完成</strong>';
        btnCheck.style.display = 'none';
        document.getElementById('correct-stat').style.display = '';
        document.getElementById('wrong-stat').style.display = '';
      }
      resetAll();
    }

    /* ─── 建立題目 ─── */
    function buildQuiz() {
      if (currentMode === 'story') return;
      if (currentMode === 'map')   return;
      if (currentMode === 'mc') { buildMCQuiz(); return; }
      if (currentMode === 'fill') { buildFillQuiz(); return; }
      const c = document.getElementById('quiz-container');
      c.innerHTML = '';
      displayQuestions.forEach((q, i) => {
        const card = document.createElement('div');
        card.className = 'question-card';
        card.id = 'card-' + i;
        card.innerHTML = `
      <div class="question-top">

        <div class="q-text">${q.q}</div>
      </div>
      <div class="choices-row">
        <button class="choice-btn" id="btn-O-${i}" onclick="handleAnswer(${i},'O')">○ 正確</button>
        <button class="choice-btn" id="btn-X-${i}" onclick="handleAnswer(${i},'X')">✕ 錯誤</button>
        <button class="guess-btn"  id="gbtn-${i}"  onclick="toggleGuess(${i})">🎲 猜的</button>
        <button class="save-png-btn" id="savebtn-${i}" onclick="captureCard(${i})" title="複製為圖片"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="13" height="17" rx="2"/><path d="M2 7v13a2 2 0 0 0 2 2h11"/></svg></button>
        <span  class="guess-label" id="glabel-${i}">⚠️ 我猜的</span>
      </div>
      <div class="result-row" id="rrow-${i}">
        <div class="result-badge" id="rbadge-${i}"></div>
      </div>
      <div class="explanation" id="exp-${i}">${q.exp}${q.page ? `<div class='page-ref'>📖 講義參考頁碼：<strong>${q.page}</strong></div>` : ''}</div>
    `;
        c.appendChild(card);
      });
    }

    /* ─── 選擇題模式：建立 ─── */
    function buildMCQuiz() {
      const c = document.getElementById('quiz-container');
      c.innerHTML = '';
      mcOptionOrders = [];
      mcMappedAns = [];
      displayMCQuestions.forEach((q, i) => {
        const LABELS = ['A', 'B', 'C', 'D'];
        // 每題選項都重新洗牌，增加隨機感
        const order = shuffleArray([0, 1, 2, 3]);
        mcOptionOrders.push(order);
        mcMappedAns.push(order.indexOf(q.ans));

        const card = document.createElement('div');
        card.className = 'question-card';
        card.id = 'card-' + i;
        card.innerHTML = `
      <div class="question-top">
        <div class="q-num" id="qnum-${i}">${i + 1}</div>
        <div class="q-text">${q.q}</div>
      </div>
      <div class="mc-options-grid" id="opts-${i}">
        ${order.map((origIdx, j) => `
          <button class="mc-option-btn" id="mc-btn-${i}-${j}" onclick="answerMC(${i},${j})">
            <span class="mc-label">${LABELS[j]}</span>
            <span>${q.options[origIdx]}</span>
          </button>`).join('')}
      </div>
      <div class="choices-row" style="margin-top:8px">
        <button class="guess-btn" id="gbtn-${i}" onclick="toggleGuess(${i})">🎲 猜的</button>
        <button class="save-png-btn" id="savebtn-${i}" onclick="captureCard(${i})" title="複製為圖片"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="13" height="17" rx="2"/><path d="M2 7v13a2 2 0 0 0 2 2h11"/></svg></button>
        <span class="guess-label" id="glabel-${i}">⚠️ 我猜的</span>
      </div>
      <div class="result-row" id="rrow-${i}">
        <div class="result-badge" id="rbadge-${i}"></div>
      </div>
      <div class="explanation" id="exp-${i}">${q.exp}${q.page ? `<div class='page-ref'>📖 講義參考頁碼：<strong>${q.page}</strong></div>` : ''}</div>
    `;
        c.appendChild(card);
      });
    }

    /* ─── 選擇題模式：作答 ─── */
    function answerMC(idx, chosen) {
      const q = displayMCQuestions[idx];
      const correctMapped = mcMappedAns[idx];
      const prev = mcUserAnswers[idx];
      if (prev === chosen) return;

      if (prev !== null) {
        if (prev === correctMapped) mcCorrectCount--;
        else mcWrongCount--;
      }

      mcUserAnswers[idx] = chosen;
      const correct = chosen === correctMapped;
      trackAnswer('final-mc', 'mc', idx, chosen, correct, q.q);

      // 鎖定猜的按鈕
      const gbtn = document.getElementById('gbtn-' + idx);
      if (gbtn) { gbtn.disabled = true; }

      // 重設所有選項樣式
      q.options.forEach((_, j) => {
        document.getElementById(`mc-btn-${idx}-${j}`).className = 'mc-option-btn';
      });
      if (correct) {
        document.getElementById(`mc-btn-${idx}-${chosen}`).className = 'mc-option-btn mc-correct';
      } else {
        document.getElementById(`mc-btn-${idx}-${chosen}`).className = 'mc-option-btn mc-wrong';
        document.getElementById(`mc-btn-${idx}-${correctMapped}`).className = 'mc-option-btn mc-show-correct';
      }

      const rbadge = document.getElementById('rbadge-' + idx);
      const LABELS = ['A', 'B', 'C', 'D'];
      const isGuess = mcGuessFlags[idx];
      const guessTag = isGuess ? ' <span style="font-size:0.82em;opacity:0.8;">🎲 猜的</span>' : '';
      if (correct) {
        mcCorrectCount++;
        rbadge.className = 'result-badge correct-badge show';
        rbadge.innerHTML = '✅ 答對了！' + guessTag;
      } else {
        mcWrongCount++;
        rbadge.className = 'result-badge wrong-badge show';
        rbadge.innerHTML = `❌ 答錯了，正確答案是「${LABELS[correctMapped]}」` + guessTag;
      }
      document.getElementById('rrow-' + idx).classList.add('show');
      document.getElementById('exp-' + idx).classList.add('show');

      const card = document.getElementById('card-' + idx);
      card.classList.remove('correct-card', 'wrong-card');
      card.classList.add(correct ? 'correct-card' : 'wrong-card');
      const qnum = document.getElementById('qnum-' + idx);
      qnum.classList.remove('answered-correct', 'answered-wrong');
      qnum.classList.add(correct ? 'answered-correct' : 'answered-wrong');

      updateBar();
      if (mcUserAnswers.filter(a => a !== null).length === displayMCQuestions.length) showFinal();
    }

    /* ─── 填空題模式：建立 ─── */
    function buildFillQuiz() {
      const c = document.getElementById('quiz-container');
      c.innerHTML = '';
      displayFillQuestions.forEach((q, i) => {
        const parts = q.q.split('___');
        let qHtml = '';
        parts.forEach((part, j) => {
          qHtml += part;
          if (j < parts.length - 1) {
            const w = Math.max(90, Math.min(220, (q.answers[j] || '').length * 18));
            qHtml += `<input class="fill-input" id="fill-input-${i}-${j}" type="text" style="width:${w}px" placeholder="填入答案" onkeydown="if(event.key==='Enter'){checkFill(${i})}">`;
          }
        });
        const card = document.createElement('div');
        card.className = 'question-card';
        card.id = 'card-' + i;
        card.innerHTML = `
      <div class="question-top">
        <div class="q-num" id="qnum-${i}">${i + 1}</div>
        <div class="q-text" style="line-height:2">${qHtml}</div>
      </div>
      <div class="fill-check-row">
        <button class="btn-fill-check" id="fill-check-${i}" onclick="checkFill(${i})">✅ 確認答案</button>
        <button class="save-png-btn" id="savebtn-${i}" onclick="captureCard(${i})" title="複製為圖片"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="13" height="17" rx="2"/><path d="M2 7v13a2 2 0 0 0 2 2h11"/></svg></button>
      </div>
      <div class="result-row" id="rrow-${i}">
        <div class="result-badge" id="rbadge-${i}"></div>
      </div>
      <div class="explanation" id="exp-${i}">${q.exp}${q.page ? `<div class='page-ref'>📖 講義參考頁碼：<strong>${q.page}</strong></div>` : ''}</div>`;
        c.appendChild(card);
      });
    }

    /* ─── 填空題：確認答案 ─── */
    function normFill(s) {
      return s.trim().replace(/\s/g, '').replace(/％/g, '%').replace(/（/g, '(').replace(/）/g, ')').toLowerCase();
    }
    function checkFill(idx) {
      const q = displayFillQuestions[idx];
      const prev = fillUserAnswers[idx];
      let allOk = true;
      const res = q.blanks.map((accept, j) => {
        const inp = document.getElementById(`fill-input-${idx}-${j}`);
        if (!inp || !inp.value.trim()) { allOk = false; return false; }
        const ok = accept.some(a => normFill(a) === normFill(inp.value));
        if (!ok) allOk = false;
        return ok;
      });

      if (prev !== null) { if (prev) fillCorrectCount--; else fillWrongCount--; }
      fillUserAnswers[idx] = allOk;
      fillUserInputs[idx] = q.blanks.map((_, j) => {
        const inp = document.getElementById(`fill-input-${idx}-${j}`);
        return inp ? inp.value : '';
      });
      trackAnswer('final-fill', 'fill', idx, null, allOk, q.q);
      if (allOk) fillCorrectCount++; else fillWrongCount++;

      q.blanks.forEach((_, j) => {
        const inp = document.getElementById(`fill-input-${idx}-${j}`);
        inp.className = 'fill-input ' + (res[j] ? 'fill-correct' : 'fill-wrong');
      });

      const rbadge = document.getElementById('rbadge-' + idx);
      document.getElementById('rrow-' + idx).classList.add('show');
      document.getElementById('exp-' + idx).classList.add('show');
      const card = document.getElementById('card-' + idx);
      card.classList.remove('correct-card', 'wrong-card');
      card.classList.add(allOk ? 'correct-card' : 'wrong-card');
      const qnum = document.getElementById('qnum-' + idx);
      qnum.classList.remove('answered-correct', 'answered-wrong');
      qnum.classList.add(allOk ? 'answered-correct' : 'answered-wrong');

      const btn = document.getElementById(`fill-check-${idx}`);
      if (allOk) {
        rbadge.className = 'result-badge correct-badge show';
        rbadge.innerHTML = '✅ 完全正確！';
        btn.style.display = 'none';
      } else {
        const hints = q.blanks.map((_, j) => !res[j] ? `<strong>${q.answers[j]}</strong>` : null).filter(Boolean).join('、');
        rbadge.className = 'result-badge wrong-badge show';
        rbadge.innerHTML = `❌ 有填錯　正確答案：${hints}`;
        btn.textContent = '🔄 清空重試';
        btn.onclick = () => clearFill(idx);
      }

      updateBar();
      if (fillUserAnswers.filter(a => a !== null).length === displayFillQuestions.length) showFinal();
    }

    /* ─── 填空題：清空重試 ─── */
    function clearFill(idx) {
      const q = displayFillQuestions[idx];
      q.blanks.forEach((_, j) => {
        const inp = document.getElementById(`fill-input-${idx}-${j}`);
        inp.disabled = false; inp.value = ''; inp.className = 'fill-input';
      });
      if (fillUserAnswers[idx] !== null) {
        if (fillUserAnswers[idx]) fillCorrectCount--; else fillWrongCount--;
      }
      fillUserAnswers[idx] = null;
      fillUserInputs[idx] = null;
      document.getElementById('rrow-' + idx).classList.remove('show');
      document.getElementById('exp-' + idx).classList.remove('show');
      const card = document.getElementById('card-' + idx);
      card.classList.remove('correct-card', 'wrong-card');
      document.getElementById('qnum-' + idx).classList.remove('answered-correct', 'answered-wrong');
      const btn = document.getElementById(`fill-check-${idx}`);
      btn.style.display = ''; btn.textContent = '✅ 確認答案';
      btn.onclick = () => checkFill(idx);
      updateBar();
      document.getElementById(`fill-input-${idx}-0`).focus();
    }

    /* ─── 答題處理（依模式分流）─── */
    function handleAnswer(idx, chosen) {
      if (currentMode === 'learn') {
        answerLearn(idx, chosen);
      } else {
        answerClassic(idx, chosen);
      }
    }

    /* ─── 學習模式：即時回饋（可改答） ─── */
    function answerLearn(idx, chosen) {
      const q = displayQuestions[idx];
      const prev = userAnswers[idx];
      if (prev === chosen) return; // 點同一個不動

      // 調整計數（如果之前有答過）
      if (prev !== null) {
        if (prev === q.ans) correctCount--;
        else wrongCount--;
      }

      userAnswers[idx] = chosen;
      const correct = chosen === q.ans;
      trackAnswer('final-learn', 'tf', idx, chosen, correct, q.q);

      // 重設按鈕樣式（不 disable，讓使用者可以改答）
      document.getElementById('btn-O-' + idx).className = 'choice-btn';
      document.getElementById('btn-X-' + idx).className = 'choice-btn';
      if (correct) {
        document.getElementById('btn-' + chosen + '-' + idx).className = 'choice-btn selected-correct';
      } else {
        document.getElementById('btn-' + chosen + '-' + idx).className = 'choice-btn selected-wrong';
        document.getElementById('btn-' + q.ans + '-' + idx).className = 'choice-btn show-correct';
      }

      const rbadge = document.getElementById('rbadge-' + idx);
      const isGuess = guessFlags[idx];
      const guessTag = isGuess ? ' <span style="font-size:0.82em;opacity:0.8;">🎲 猜的</span>' : '';
      if (correct) {
        rbadge.className = 'result-badge correct-badge show';
        rbadge.innerHTML = '✅ 答對了！' + guessTag;
        correctCount++;
      } else {
        rbadge.className = 'result-badge wrong-badge show';
        rbadge.innerHTML = `❌ 答錯了，正確答案是「${q.ans === 'O' ? '○ 正確' : '✕ 錯誤'}」` + guessTag;
        wrongCount++;
      }
      document.getElementById('rrow-' + idx).classList.add('show');
      document.getElementById('exp-' + idx).classList.add('show');

      const card = document.getElementById('card-' + idx);
      card.classList.remove('correct-card', 'wrong-card');
      card.classList.add(correct ? 'correct-card' : 'wrong-card');
      const qnum = document.getElementById('qnum-' + idx);
      qnum.classList.remove('answered-correct', 'answered-wrong');
      qnum.classList.add(correct ? 'answered-correct' : 'answered-wrong');

      updateBar();
      if (userAnswers.filter(a => a !== null).length === displayQuestions.length) showFinal();
    }

    /* ─── 傳統模式：選擇不立即批改 ─── */
    function answerClassic(idx, chosen) {
      if (classicChecked) return;
      userAnswers[idx] = chosen;
      document.getElementById('btn-O-' + idx).className = 'choice-btn' + (chosen === 'O' ? ' selected-O' : '');
      document.getElementById('btn-X-' + idx).className = 'choice-btn' + (chosen === 'X' ? ' selected-X' : '');
      updateBar();
    }

    /* ─── 傳統模式：對答案 ─── */
    function checkAll() {
      if (currentMode !== 'classic') return;
      classicChecked = true;
      let score = 0, guessCorrect = 0, guessWrong = 0;

      displayQuestions.forEach((q, i) => {
        const card = document.getElementById('card-' + i);
        const rbadge = document.getElementById('rbadge-' + i);
        const isGuess = guessFlags[i];
        ['btn-O-' + i, 'btn-X-' + i, 'gbtn-' + i].forEach(id => {
          const el = document.getElementById(id);
          if (el) { el.style.cursor = 'default'; el.style.pointerEvents = 'none'; }
        });
        const guessTag = isGuess ? ' <span style="font-size:0.82em;opacity:0.85;">🎲 猜的</span>' : '';
        card.classList.remove('guessed-card');

        if (userAnswers[i] === null) {
          card.classList.add('unanswered');
          rbadge.className = 'result-badge wrong-badge show';
          rbadge.innerHTML = `⚠️ 未作答，正確答案：${q.ans === 'O' ? '○ 正確' : '✕ 錯誤'}${guessTag}`;
        } else if (userAnswers[i] === q.ans) {
          score++;
          if (isGuess) guessCorrect++;
          card.classList.add('correct-card');
          rbadge.className = 'result-badge correct-badge show';
          rbadge.innerHTML = `✅ 答對了！${guessTag}`;
        } else {
          if (isGuess) guessWrong++;
          card.classList.add('wrong-card');
          rbadge.className = 'result-badge wrong-badge show';
          rbadge.innerHTML = `❌ 答錯了，正確答案：${q.ans === 'O' ? '○ 正確' : '✕ 錯誤'}${guessTag}`;
        }
        trackAnswer('final-classic', 'tf', i, userAnswers[i], userAnswers[i] === q.ans, q.q);
        document.getElementById('rrow-' + i).classList.add('show');
        document.getElementById('exp-' + i).classList.add('show');
      });

      correctCount = score;
      wrongCount = displayQuestions.length - score;

      const totalGuess = guessFlags.filter(Boolean).length;
      document.getElementById('fs-guess-wrap').style.display = totalGuess > 0 ? '' : 'none';
      document.getElementById('fs-guess').textContent = guessCorrect;
      document.getElementById('fs-guessed-total').textContent = totalGuess;
      document.getElementById('final-hint').textContent = '詳解已全部顯示於各題目下方，可往上滾動複習';
      updateBar();
      showFinal();
    }

    /* ─── 猜題標記 ─── */
    function toggleGuess(idx) {
      if (currentMode === 'fill') return;
      if (currentMode === 'mc') {
        // 答題後不能再標記（已鎖定按鈕）
        if (mcUserAnswers[idx] !== null) return;
        mcGuessFlags[idx] = !mcGuessFlags[idx];
        document.getElementById('gbtn-' + idx).classList.toggle('active', mcGuessFlags[idx]);
        document.getElementById('glabel-' + idx).classList.toggle('show', mcGuessFlags[idx]);
        document.getElementById('card-' + idx).classList.toggle('guessed-card', mcGuessFlags[idx]);
        updateBar();
        return;
      }
      // 傳統模式：答題後或對答案後不能改；學習模式：任何時候都可以標記
      if (currentMode === 'classic') {
        if (userAnswers[idx] !== null || classicChecked) return;
      }
      guessFlags[idx] = !guessFlags[idx];
      document.getElementById('gbtn-' + idx).classList.toggle('active', guessFlags[idx]);
      document.getElementById('glabel-' + idx).classList.toggle('show', guessFlags[idx]);
      document.getElementById('card-' + idx).classList.toggle('guessed-card', guessFlags[idx]);
      updateBar();
    }


    /* ─── 進度條 ─── */
    function updateBar() {
      if (currentMode === 'story') return;
      if (currentMode === 'map')   return;
      let answered, total, corr, wrng, gCount = 0;
      if (currentMode === 'mc') {
        total = displayMCQuestions.length; answered = mcUserAnswers.filter(a => a !== null).length;
        corr = mcCorrectCount; wrng = mcWrongCount;
        gCount = mcGuessFlags.filter(Boolean).length;
      } else if (currentMode === 'fill') {
        total = displayFillQuestions.length; answered = fillUserAnswers.filter(a => a !== null).length;
        corr = fillCorrectCount; wrng = fillWrongCount;
      } else {
        total = displayQuestions.length; answered = userAnswers.filter(a => a !== null).length;
        corr = correctCount; wrng = wrongCount;
        gCount = guessFlags.filter(Boolean).length;
      }
      document.getElementById('total-count').textContent = total;
      document.getElementById('answered-count').textContent = answered;
      document.getElementById('correct-count').textContent = corr;
      document.getElementById('wrong-count').textContent = wrng;
      document.getElementById('progress-fill').style.width = (answered / total * 100) + '%';
      const chip = document.getElementById('guess-chip');
      chip.style.display = gCount > 0 ? 'inline' : 'none';
      document.getElementById('guess-count').textContent = gCount;
    }

    /* ─── 最終結果 ─── */
    function showFinal() {
      let score, total, retryCount = 0;
      const fb = document.getElementById('final-box');

      if (currentMode === 'mc') {
        total = displayMCQuestions.length; score = mcCorrectCount;
        const mcTotalGuess = mcGuessFlags.filter(Boolean).length;
        const mcGuessCorrect = displayMCQuestions.reduce((n, _, i) => n + (mcGuessFlags[i] && mcUserAnswers[i] === mcMappedAns[i] ? 1 : 0), 0);
        document.getElementById('fs-guess-wrap').style.display = mcTotalGuess > 0 ? '' : 'none';
        document.getElementById('fs-guess').textContent = mcGuessCorrect;
        document.getElementById('fs-guessed-total').textContent = mcTotalGuess;
        document.getElementById('final-hint').textContent = '詳解已全部顯示於各題目下方，可往上滾動複習';
        const p = score / total;
        document.getElementById('final-msg').textContent = p >= 0.9 ? '🏆 優秀！選擇題觀念已完全融會貫通！' : p >= 0.7 ? '🎯 良好！再加強幾個易混淆數字就滿分了！' : p >= 0.5 ? '📖 尚可！建議重點複習罰鍰金額與定義條文。' : '💪 加油！多對照判斷題詳解，釐清每個關鍵數字。';
        retryCount = displayMCQuestions.filter((_, i) => mcUserAnswers[i] !== mcMappedAns[i]).length;
      } else if (currentMode === 'fill') {
        total = displayFillQuestions.length; score = fillCorrectCount;
        document.getElementById('fs-guess-wrap').style.display = 'none';
        document.getElementById('final-hint').textContent = '詳解已全部顯示於各題目下方，可往上滾動複習';
        const p = score / total;
        document.getElementById('final-msg').textContent = p >= 0.9 ? '🏆 優秀！關鍵數字與法條細節已完全掌握！' : p >= 0.7 ? '🎯 良好！再多背幾個關鍵數字就完美了！' : p >= 0.5 ? '📖 尚可！建議重點複習容易填錯的數字條文。' : '💪 加油！多練幾次，關鍵數字一定能記住！';
        retryCount = displayFillQuestions.filter((_, i) => fillUserAnswers[i] !== true).length;
      } else {
        total = displayQuestions.length; score = correctCount;
        const totalGuess = guessFlags.filter(Boolean).length;
        const guessCorrect = displayQuestions.reduce((n, q, i) => n + (guessFlags[i] && userAnswers[i] === q.ans ? 1 : 0), 0);
        if (currentMode === 'learn' || currentMode === 'classic') {
          document.getElementById('fs-guess-wrap').style.display = totalGuess > 0 ? '' : 'none';
          document.getElementById('fs-guess').textContent = guessCorrect;
          document.getElementById('fs-guessed-total').textContent = totalGuess;
        }
        document.getElementById('final-hint').textContent = '詳解已全部顯示於各題目下方，可往上滾動複習';
        const p = score / total;
        document.getElementById('final-msg').textContent = p >= 0.9 ? '🏆 優秀！廣告法規熟悉度極高！' : p >= 0.7 ? '🎯 良好！繼續加強幾個易混淆條文就更完美了！' : p >= 0.5 ? '📖 尚可！建議重點複習罰則金額與定義條文。' : '💪 加油！多多複習法條原文，尤其注意數字與主詞。';
        if (currentMode === 'learn') retryCount = displayQuestions.filter((q, i) => userAnswers[i] !== q.ans || guessFlags[i]).length;
      }

      document.getElementById('final-score-text').textContent = `得分：${score} / ${total}`;

    /* ─── 重置 ─── */
    function resetAll() {
      document.getElementById('final-box').style.display = 'none';
      if (currentMode === 'story') { initStoryMode(); return; }
      if (currentMode === 'map')   { initConceptMap(); return; }
      document.getElementById('answered-count').textContent = '0';
      document.getElementById('correct-count').textContent = '0';
      document.getElementById('wrong-count').textContent = '0';
      document.getElementById('progress-fill').style.width = '0%';
      document.getElementById('guess-chip').style.display = 'none';
      if (document.getElementById('retry-wrap')) document.getElementById('retry-wrap').style.display = 'none';
      if (document.getElementById('export-wrong-wrap')) document.getElementById('export-wrong-wrap').style.display = 'none';

      if (currentMode === 'mc') {
        displayMCQuestions = shuffleEnabled ? shuffleArray([...activeMCQuestions]) : [...activeMCQuestions];
        mcUserAnswers = Array(displayMCQuestions.length).fill(null);
        mcGuessFlags = Array(displayMCQuestions.length).fill(false);
        mcOptionOrders = []; mcMappedAns = [];
        mcCorrectCount = 0; mcWrongCount = 0;
      } else if (currentMode === 'fill') {
        displayFillQuestions = shuffleEnabled ? shuffleArray([...activeFillQuestions]) : [...activeFillQuestions];
        fillUserAnswers = Array(displayFillQuestions.length).fill(null);
        fillUserInputs = Array(displayFillQuestions.length).fill(null);
        fillCorrectCount = 0; fillWrongCount = 0;
      } else {
        displayQuestions = shuffleEnabled ? shuffleArray([...activeQuestions]) : [...activeQuestions];
        userAnswers = Array(TOTAL).fill(null);
        guessFlags = Array(TOTAL).fill(false);
        correctCount = 0; wrongCount = 0;
        classicChecked = false;
      }
      buildQuiz();
      updateBar();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    /* ─── 重新練習答錯題目 ─── */
    function retryWrong() {
      let retryList;
      if (currentMode === 'learn') {
        retryList = displayQuestions.filter((q, i) => userAnswers[i] !== q.ans || guessFlags[i]);
        if (shuffleEnabled) shuffleArray(retryList);
        displayQuestions = retryList;
        userAnswers = Array(retryList.length).fill(null);
        guessFlags = Array(retryList.length).fill(false);
        correctCount = 0; wrongCount = 0;
      } else if (currentMode === 'mc') {
        retryList = displayMCQuestions.filter((_, i) => mcUserAnswers[i] !== mcMappedAns[i] || mcGuessFlags[i]);
        if (shuffleEnabled) shuffleArray(retryList);
        displayMCQuestions = retryList;
        mcUserAnswers = Array(retryList.length).fill(null);
        mcGuessFlags = Array(retryList.length).fill(false);
        mcOptionOrders = []; mcMappedAns = [];
        mcCorrectCount = 0; mcWrongCount = 0;
      } else if (currentMode === 'fill') {
        retryList = displayFillQuestions.filter((_, i) => fillUserAnswers[i] !== true);
        if (shuffleEnabled) shuffleArray(retryList);
        displayFillQuestions = retryList;
        fillUserAnswers = Array(retryList.length).fill(null);
        fillUserInputs = Array(retryList.length).fill(null);
        fillCorrectCount = 0; fillWrongCount = 0;
      }
      if (!retryList || retryList.length === 0) return;
      document.getElementById('final-box').style.display = 'none';
      document.getElementById('answered-count').textContent = '0';
      document.getElementById('correct-count').textContent = '0';
      document.getElementById('wrong-count').textContent = '0';
      document.getElementById('progress-fill').style.width = '0%';
      document.getElementById('guess-chip').style.display = 'none';
      buildQuiz();
      updateBar();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    /* ─── 錯題匯出（解鎖限定，學習／傳統／選擇／填空） ─── */
    function htmlToPlainText(html) {
      if (!html) return '';
      const d = document.createElement('div');
      d.innerHTML = html;
      d.querySelectorAll('br').forEach(br => br.replaceWith('\n'));
      d.querySelectorAll('div, p, li').forEach(el => { el.appendChild(document.createTextNode('\n')); });
      let txt = d.textContent || '';
      return txt.replace(/ /g, ' ').replace(/[ \t]+\n/g, '\n').replace(/\n{3,}/g, '\n\n').trim();
    }

    function formatNowForExport() {
      const d = new Date();
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function tfText(v) {
      if (v === 'O') return '○ 正確';
      if (v === 'X') return '✕ 錯誤';
      return '（未作答）';
    }

    function statusTag(isWrong, isGuess) {
      if (isWrong && isGuess) return '❌ 答錯　🎲 猜的';
      if (isWrong) return '❌ 答錯';
      if (isGuess) return '🎲 猜對（不確定）';
      return '';
    }

    function collectWrongItems() {
      const items = [];
      if (currentMode === 'learn' || currentMode === 'classic') {
        displayQuestions.forEach((q, i) => {
          const ua = userAnswers[i];
          const wrong = (ua === null) || (ua !== q.ans);
          const guessed = !!guessFlags[i];
          // learn 模式：要全答完才 showFinal，所以 ua 不會是 null
          if (!wrong && !guessed) return;
          if (currentMode === 'learn' && ua === null) return;
          items.push({
            type: '是非題',
            tag: statusTag(wrong, guessed),
            page: q.page || '',
            questionLines: [`題目：${q.q}`],
            userAns: tfText(ua),
            correctAns: tfText(q.ans),
            exp: q.exp
          });
        });
      } else if (currentMode === 'mc') {
        const LABELS = ['A', 'B', 'C', 'D'];
        displayMCQuestions.forEach((q, i) => {
          const ua = mcUserAnswers[i];
          const wrong = (ua === null) || (ua !== mcMappedAns[i]);
          const guessed = !!mcGuessFlags[i];
          if (!wrong && !guessed) return;
          if (ua === null) return;
          const order = mcOptionOrders[i] || [0, 1, 2, 3];
          const optionLines = order.map((origIdx, k) => `  ${LABELS[k]}. ${q.options[origIdx]}`);
          const userOriginalIdx = order[ua];
          items.push({
            type: '選擇題',
            tag: statusTag(wrong, guessed),
            page: q.page || '',
            questionLines: [`題目：${q.q}`, '選項：', ...optionLines],
            userAns: `${LABELS[ua]}. ${q.options[userOriginalIdx]}`,
            correctAns: `${LABELS[mcMappedAns[i]]}. ${q.options[q.ans]}`,
            exp: q.exp
          });
        });
      } else if (currentMode === 'fill') {
        displayFillQuestions.forEach((q, i) => {
          if (fillUserAnswers[i] !== false) return;
          const inputs = fillUserInputs[i] || q.blanks.map(() => '');
          const parts = q.q.split('___');
          let userFilled = '', correctFilled = '';
          parts.forEach((part, j) => {
            userFilled += part;
            correctFilled += part;
            if (j < parts.length - 1) {
              const v = (inputs[j] || '').trim();
              userFilled += `【${v || '（未填）'}】`;
              correctFilled += `【${q.answers[j] || ''}】`;
            }
          });
          items.push({
            type: '填空題',
            tag: '❌ 答錯',
            page: q.page || '',
            questionLines: [`題目：${q.q}`],
            userAns: userFilled,
            correctAns: correctFilled,
            exp: q.exp
          });
        });
      }
      return items;
    }

    function countWrongForExport() {
      return collectWrongItems().length;
    }

    function buildWrongExportText() {
      const modeNames = { learn: '學習模式', classic: '傳統模式', mc: '選擇題模式', fill: '填空題模式' };
      const modeName = modeNames[currentMode] || currentMode;
      const items = collectWrongItems();
      const wrongOnly = items.filter(it => it.tag && it.tag.includes('答錯')).length;
      const guessOnly = items.filter(it => it.tag === '🎲 猜對（不確定）').length;
      const breakdown = wrongOnly && guessOnly
        ? `${wrongOnly} 題答錯 + ${guessOnly} 題猜對`
        : wrongOnly
          ? `${wrongOnly} 題答錯`
          : guessOnly
            ? `${guessOnly} 題猜對`
            : '';

      const header = [
        '═══════════════════════════════════════',
        '  廣告法規期末考 — 錯題＋猜題複習清單',
        `  模式：${modeName}`,
        `  匯出時間：${formatNowForExport()}`,
        `  共 ${items.length} 題${breakdown ? `（${breakdown}）` : ''}`,
        '═══════════════════════════════════════',
        ''
      ].join('\n');

      if (items.length === 0) {
        return header + '\n🎉 本次沒有錯題也沒有猜題，完美達成！';
      }

      const body = items.map((it, k) => {
        return [
          `【第 ${k + 1} 題】${it.type}${it.tag ? '　' + it.tag : ''}${it.page ? '　法條：' + it.page : ''}`,
          ...it.questionLines,
          '',
          `我的作答：${it.userAns}`,
          `正確答案：${it.correctAns}`,
          '',
          '詳解：',
          htmlToPlainText(it.exp),
          '───────────────────────────────────────',
          ''
        ].join('\n');
      }).join('\n');

      return header + '\n' + body;
    }

    function exportWrongAnswers() {
      const text = buildWrongExportText();
      document.getElementById('export-text').value = text;
      document.getElementById('export-modal-mask').classList.add('show');
      document.getElementById('copy-status').classList.remove('show');
    }

    function closeExportModal() {
      document.getElementById('export-modal-mask').classList.remove('show');
    }

    async function copyExportText() {
      const ta = document.getElementById('export-text');
      let ok = false;
      try {
        await navigator.clipboard.writeText(ta.value);
        ok = true;
      } catch (e) {
        try {
          ta.removeAttribute('readonly');
          ta.focus(); ta.select();
          ok = document.execCommand('copy');
          ta.setAttribute('readonly', '');
        } catch (e2) { ok = false; }
      }
      const s = document.getElementById('copy-status');
      if (ok) {
        s.textContent = '✓ 已複製到剪貼簿';
        s.style.color = '#16a34a';
      } else {
        s.textContent = '⚠ 複製失敗，請手動全選複製';
        s.style.color = '#dc2626';
      }
      s.classList.add('show');
      setTimeout(() => s.classList.remove('show'), 2500);
    }

    function downloadExportText() {
      const text = document.getElementById('export-text').value;
      const modeNames = { learn: 'learn', classic: 'classic', mc: 'mc', fill: 'fill', map: 'map' };
      const stamp = formatNowForExport().replace(/[: ]/g, '-');
      const fname = `期末錯題_${modeNames[currentMode] || 'exam'}_${stamp}.txt`;
      const blob = new Blob(['﻿' + text], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = fname;
      document.body.appendChild(a); a.click();
      setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
    }

    // ESC 關閉匯出視窗
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        const m = document.getElementById('export-modal-mask');
        if (m && m.classList.contains('show')) closeExportModal();
      }
    });

    <div id="s-end" class="story-end-panel"></div>`;
    }

    function storyDismissIntro() {
      document.getElementById('story-intro').style.display = 'none';
      document.getElementById('story-game').style.display = 'block';
      storyBuildScene(0);
    }

    /* ── 建立題目場景 ── */
    function storyBuildScene(idx) {
      const day = currentDay;
      if (idx >= day.questions.length) { storyShowEnd(); return; }
      const q = day.questions[idx];
      storyState.answered = false;

      document.getElementById('s-hearts').textContent = sHearts(storyState.hearts);
      document.getElementById('s-streak').textContent = storyState.streak >= 2 ? `🔥 ${storyState.streak}連對` : storyState.streak === 1 ? '🔥 1連對' : '－';
      document.getElementById('s-progress').textContent = `${idx + 1} / ${day.questions.length}`;
      document.getElementById('s-extra').style.display = 'none';
      document.getElementById('s-lucky').style.display = 'none';

      const btnArea = q.type === 'tf'
        ? `<div class="story-tf-buttons">
         <button class="story-tf-btn story-O" id="sbO" onclick="storyTF('O')">○ 正確</button>
         <button class="story-tf-btn story-X" id="sbX" onclick="storyTF('X')">✕ 錯誤</button>
       </div>`
        : `<div class="story-mc-options">${q.options.map((o, i) => `
         <button class="story-mc-btn" id="smc${i}" onclick="storyMC(${i})">
           <span class="story-mc-label">${S_LABELS[i]}</span><span>${o}</span>
         </button>`).join('')}</div>`;

      // 乙女模式：從路線設定取角色；一般模式：從題目取角色
      const isOtome = day.type === 'otome' && storyOtomeRoute;
      const route = isOtome ? day.routes[storyOtomeRoute] : null;
      const displayClient = isOtome ? route.character : q.client;
      const displayLine   = isOtome ? q.routeLine[storyOtomeRoute] : q.clientLine;
      const char = isOtome ? storyCharacters[route.character] : getCharacter(q.client);
      const charColor  = isOtome ? route.color : (char ? char.color : '#9b59b6');
      const charAvatar = isOtome ? route.avatarNormal : (char ? char.avatar : '');
      const charTitle  = char ? char.title : '';
      const bg = getSceneBackground(q.setup);

      // 角色立繪加版本參數強制刷新瀏覽器快取
      const AVATAR_VER = '20260531';
      const bust = (p) => p + (p.includes('?') ? '&' : '?') + 'v=' + AVATAR_VER;
      const spriteHTML = charAvatar
        ? `<div class="story-vn-sprite">
         <img src="${bust(charAvatar)}" alt="${displayClient}" onerror="this.parentElement.style.display='none'" />
       </div>`
        : '';
      const miniHTML = charAvatar
        ? `<div class="story-vn-mini"><img src="${bust(charAvatar)}" alt="" onerror="this.parentElement.style.display='none'"/></div>`
        : '';

      document.getElementById('s-content').innerHTML = `
    <div class="story-vn-stage">
      <div class="story-vn-bg" style="background:${bg}"></div>
      <div class="story-vn-particles">
        <div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div>
        <div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div>
        <div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div>
        <div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div>
      </div>
      <div class="story-vn-setup">${q.setup}</div>
      ${spriteHTML}
      <div class="story-vn-dbox">
        <div class="story-vn-namerow">
          ${miniHTML}
          <span class="story-vn-namebox" style="background:${charColor}">
            ${displayClient}${charTitle ? `<span class="story-vn-title">${charTitle}</span>` : ''}
          </span>
        </div>
        <div class="story-vn-line">${displayLine}</div>
        <div class="story-vn-dbox-arrow"></div>
      </div>
    </div>
    <div class="story-q-card">
      <div class="story-q-label">⚖️ 法律判斷</div>
      <div class="story-q-text">${q.q}</div>
      ${btnArea}
    </div>
    <div class="story-reaction-box" id="s-react"></div>
    <button class="story-next-btn" id="s-next" onclick="storyNext()">
      ${idx + 1 < day.questions.length ? '▶ 下一題' : '📋 結算今日成績'}
    </button>`;
    }

    /* ── 作答 ── */
    function storyTF(choice) {
      if (storyState.answered) return;
      storyState.answered = true;
      const q = currentDay.questions[storyState.qIdx];
      trackAnswer('final-story', 'tf', storyState.qIdx, choice, choice === q.ans, q.q);
      ['sbO', 'sbX'].forEach(id => { const b = document.getElementById(id); if (b) { b.style.pointerEvents = 'none'; } });
      const winBtn = document.getElementById('sb' + q.ans);
      if (winBtn) winBtn.classList.add('sel');
      storyProcess(choice === q.ans, q);
    }

    function storyMC(opt) {
      if (storyState.answered) return;
      storyState.answered = true;
      const q = currentDay.questions[storyState.qIdx];
      trackAnswer('final-story', 'mc', storyState.qIdx, opt, opt === q.ans, q.q);
      for (let i = 0; i < q.options.length; i++) {
        const b = document.getElementById('smc' + i);
        if (!b) continue;
        b.style.pointerEvents = 'none';
        if (i === q.ans) b.classList.add('smc-correct');
        else if (i === opt) b.classList.add('smc-wrong');
      }
      storyProcess(opt === q.ans, q);
    }

    function storyProcess(ok, q) {
      const isOtome = currentDay.type === 'otome' && storyOtomeRoute;
      const route = isOtome ? currentDay.routes[storyOtomeRoute] : null;
      if (ok) {
        storyState.score++;
        storyState.streak++;
        if (storyState.hearts < 3) storyState.hearts = Math.min(S_MAX_HEARTS, storyState.hearts + 1);
        if (storyState.streak === 3) {
          storyState.hearts = Math.min(S_MAX_HEARTS, storyState.hearts + 1);
          const el = document.getElementById('s-lucky');
          if (isOtome) {
            el.textContent = route.luckyMsg;
          } else {
            const msgs = [
              '🎉 【幸運事件】阿肥端來咖啡：「學長！連對三題！拿鐵是我親手泡的！」',
              '🎉 【幸運事件】主任突然說：「表現不錯，下午可以早走五分鐘。」',
              '🎉 【幸運事件】酸酸難得說了句：「……今天狀態還可以。」（這大概是她能說出口最好的讚美了。）'
            ];
            el.textContent = sRand(msgs);
          }
          el.style.display = 'block';
        }
      } else {
        storyState.streak = 0;
        storyState.hearts = Math.max(0, storyState.hearts - 1);
        storyState.wrongList.push({ no: storyState.qIdx + 1, q: q.q, ans: q.ans, type: q.type, options: q.options });
      }
      document.getElementById('s-hearts').textContent = sHearts(storyState.hearts);
      document.getElementById('s-streak').textContent = storyState.streak >= 2 ? `🔥 ${storyState.streak}連對` : storyState.streak === 1 ? '🔥 1連對' : '－';

      const badge = ok
        ? '✅ 答對了！'
        : `❌ 答錯了！正確答案：${q.type === 'tf' ? (q.ans === 'O' ? '○ 正確' : '✕ 錯誤') : S_LABELS[q.ans] + '. ' + q.options[q.ans]}`;
      // 乙女模式使用路線專屬反應文字；一般模式用題目自帶陣列
      const reactions = isOtome
        ? (ok ? q.correctR[storyOtomeRoute] : q.wrongR[storyOtomeRoute])
        : (ok ? q.correctR : q.wrongR);
      const react = document.getElementById('s-react');
      react.className = 'story-reaction-box ' + (ok ? 'sreact-correct' : 'sreact-wrong');
      react.style.display = 'block';
      react.innerHTML = `
    <div class="story-reaction-badge">${badge}</div>
    <div class="story-reaction-line">${sRand(reactions)}</div>
    <div class="story-exp-box">${q.exp}</div>`;
      document.getElementById('s-next').style.display = 'block';
      setTimeout(() => { react.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 100);
    }

    /* ── 特殊指令 ── */
    function storyCmd(cmd) {
      if (cmd === 'end') { storyShowEnd(true); return; }
      const q = currentDay.questions[storyState.qIdx];
      const box = document.getElementById('s-extra');
      box.style.display = 'block';
      if (cmd === 'sour') box.innerHTML = `<strong>🧊 林酸酸講解：</strong><br>${q.sour || '（酸酸今天不想開口。）'}`;
      if (cmd === 'rage') box.innerHTML = `<strong>😡 王鐵嘴主任發飆：</strong><br>${q.rage || '（主任今天難得沒發飆，珍惜吧。）'}`;
    }

    /* ── 下一題 ── */
    function storyNext() {
      storyState.qIdx++;
      storyBuildScene(storyState.qIdx);
      const game = document.getElementById('story-game');
      if (game) window.scrollTo({ top: game.offsetTop - 20, behavior: 'smooth' });
    }

    /* ── 結算 ── */
    function storyShowEnd(early = false) {
      const gameEl = document.getElementById('story-game');
      const introEl = document.getElementById('story-intro');
      if (gameEl) gameEl.style.display = 'none';
      if (introEl) introEl.style.display = 'none';
      const total = currentDay.questions.length;
      const score = storyState.score;
      const hearts = storyState.hearts;
      const endEl = document.getElementById('s-end');
      endEl.style.display = 'block';

      const recapHTML = storyState.wrongList.length > 0 ? `
    <div class="story-end-recap">
      <strong>📋 今日法條回顧：</strong><br><br>
      ${storyState.wrongList.map(w => `
        <div style="margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.15);">
          <span style="opacity:0.7;font-size:0.85em;">第 ${w.no} 題</span><br>${w.q}<br>
          <span style="color:#a9dfbf;">正確答案：${w.type === 'tf' ? (w.ans === 'O' ? '○ 正確' : '✕ 錯誤') : S_LABELS[w.ans] + '. ' + w.options[w.ans]}</span>
        </div>`).join('')}
    </div>` : '';

      // ── 乙女模式：依好感度顯示三種結局 ──
      const isOtome = currentDay.type === 'otome' && storyOtomeRoute;
      if (isOtome) {
        const route = currentDay.routes[storyOtomeRoute];
        const endKey = hearts >= 4 ? 'good' : hearts >= 2 ? 'normal' : 'bad';
        const ending = route.endings[endKey];
        const endClass = endKey === 'good' ? 'otome-good-end' : endKey === 'normal' ? 'otome-normal-end' : 'otome-bad-end';
        const AVATAR_VER = '20260531';
        const bust = (p) => p + (p.includes('?') ? '&' : '?') + 'v=' + AVATAR_VER;
        const avatarSrc = endKey === 'good' ? route.avatarHappy : route.avatarNormal;
        endEl.innerHTML = `
    <div class="${endClass}">
      ${early ? '<div style="font-size:0.82em;opacity:0.7;margin-bottom:10px;color:rgba(255,255,255,0.6);">（提前離場）</div>' : ''}
      <div class="otome-end-type-label">${ending.title}</div>
      <img src="${bust(avatarSrc)}" class="otome-end-avatar" alt="${route.character}" onerror="this.style.display='none'" />
      <div style="font-size:0.82em;color:rgba(255,200,220,0.7);margin-bottom:12px;">得分：${score} / ${total}　${sHearts(hearts)}</div>
      <div class="otome-end-text">${ending.text}</div>
    </div>
    ${recapHTML}
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:16px;">
      <button class="story-restart-btn" onclick="storyOtomeRoute=null;startStoryDay(currentDay)">💕 重新選擇路線</button>
      <button class="story-restart-btn" onclick="storyOtomeRoute=null;initStoryMode()">📋 選擇關卡</button>
    </div>`;
        endEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
        return;
      }

      // ── 一般模式結算 ──
      const pct = score / total;
      let verdict;
      if (pct >= 0.9) verdict = hearts >= 4 ? '🏆 主任要給你加薪！（才怪，但至少今天沒被開除，而且主任心情很好！）' : '🏆 優秀！今晚可以正常下班！';
      else if (pct >= 0.7) verdict = '🎯 還算能看的新人，至少沒讓事務所被客訴。繼續加油。';
      else if (pct >= 0.5) verdict = '📖 勉強沒被開除，但主任說你明天要寫三份反省書。';
      else verdict = '💀 王鐵嘴主任：「你確定你有法學院畢業嗎？！我要查你的畢業證書真偽！」';

      const dayLabel = currentDay === storyDay1 ? 'Day 1' : currentDay === storyDay2 ? 'Day 2' : currentDay === storyDay3 ? 'Day 3' : currentDay === storyDay4 ? 'Day 4' : currentDay === storyDay5 ? 'Day 5' : 'Day 6';
      endEl.innerHTML = `
    <div class="story-end-title">${dayLabel} 結束！</div>
    ${early ? '<div style="font-size:0.82em;opacity:0.7;margin-bottom:10px;">（提前離場）</div>' : ''}
    <div class="story-end-score">得分：${score} / ${total}　${sHearts(hearts)}</div>
    <div class="story-end-verdict">${verdict}</div>
    ${recapHTML}
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
      <button class="story-restart-btn" onclick="startStoryDay(currentDay)">🔄 重新挑戰 ${dayLabel}</button>
      <button class="story-restart-btn" onclick="initStoryMode()">📋 選擇關卡</button>
    </div>`;
      endEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    /* ─── 複製題目為圖片到剪貼簿 ─── */
    function captureCard(idx) {
      const card = document.getElementById('card-' + idx);
      const btn = document.getElementById('savebtn-' + idx);
      if (!card) return;

      if (btn) btn.style.visibility = 'hidden';
      btn && btn.classList.add('saving');

      // 確保詳解可見
      const expEl = document.getElementById('exp-' + idx);
      const wasHidden = expEl && !expEl.classList.contains('show');
      if (wasHidden) expEl.classList.add('show');

      html2canvas(card, {
        backgroundColor: '#ffffff',
        scale: 2,
        useCORS: true,
        logging: false
      }).then(canvas => {
        canvas.toBlob(blob => {
          if (!blob) return;
          try {
            navigator.clipboard.write([
              new ClipboardItem({ 'image/png': blob })
            ]).then(() => {
              // 短暫閃綠色提示複製成功
              if (btn) {
                btn.style.visibility = '';
                btn.style.borderColor = '#27ae60';
                btn.style.color = '#27ae60';
                setTimeout(() => {
                  btn.style.borderColor = '';
                  btn.style.color = '';
                }, 1200);
              }
            }).catch(() => fallbackDownload(canvas, idx));
          } catch (e) { fallbackDownload(canvas, idx); }
        }, 'image/png');
      }).finally(() => {
        btn && btn.classList.remove('saving');
        if (wasHidden) expEl.classList.remove('show');
      });
    }
    function fallbackDownload(canvas, idx) {
      // 瀏覽器不支援剪貼簿時，顯示彈窗讓使用者右鍵複製
      const btn = document.getElementById('savebtn-' + idx);
      if (btn) btn.style.visibility = '';
      const dataUrl = canvas.toDataURL('image/png');

      // 建立遮罩
      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;';

      const hint = document.createElement('div');
      hint.textContent = '在圖片上按右鍵 → 複製圖片，即可貼到 Word';
      hint.style.cssText = 'color:#fff;font-size:1rem;background:#333;padding:8px 16px;border-radius:8px;';

      const img = document.createElement('img');
      img.src = dataUrl;
      img.style.cssText = 'max-width:90vw;max-height:75vh;border-radius:8px;box-shadow:0 4px 24px rgba(0,0,0,.5);';

      const closeBtn = document.createElement('button');
      closeBtn.textContent = '關閉';
      closeBtn.style.cssText = 'padding:8px 28px;border:none;border-radius:8px;background:#555;color:#fff;font-size:0.95rem;cursor:pointer;';
      closeBtn.onclick = () => document.body.removeChild(overlay);
      overlay.addEventListener('click', e => { if (e.target === overlay) document.body.removeChild(overlay); });

      overlay.append(hint, img, closeBtn);
      document.body.appendChild(overlay);
    }

    /* ══════════════════════════════════════
       概念地圖模式 — 核心邏輯
    ══════════════════════════════════════ */
    let cmCurrentSubId = null;
    let cmCurrentQs = [];           // 本次抽到的 5 題：{ type, data, idx }
    let cmAnswered = [];            // 對應每題是否已作答
    let cmCorrectFlags = [];        // 對應每題答對與否
    let cmGuessFlags = [];          // 對應每題是否標記為「猜的」
    let cmUserAnswers = [];         // 對應每題使用者作答（tf:'O'/'X'；mc:pos；fill:string[]）
    let cmMCOrders = [];            // MC 選項洗牌順序
    let cmOpenCat = 0;              // 預設展開第一類

    function initConceptMap() {
      const panel = document.getElementById('concept-map-panel');
      panel.innerHTML = `
        <div class="cm-header">
          <h1>🗺️ 概念地圖</h1>
          <p>左側選擇概念 → 右側看白話故事 + 隨堂 5 題</p>
        </div>
        <div class="cm-layout">
          <div class="cm-sidebar" id="cm-sidebar"></div>
          <div class="cm-content" id="cm-content">
            <div class="cm-placeholder">
              <div class="big">👈</div>
              <div>從左側選一個核心概念開始學習</div>
              <div style="margin-top:8px;font-size:0.85em;opacity:0.7;">共 ${concepts.length} 大類法規・${concepts.reduce((n, c) => n + c.subTopics.length, 0)} 個核心概念</div>
            </div>
          </div>
        </div>
      `;
      renderCMSidebar();
    }

    function renderCMSidebar() {
      const html = concepts.map((cat, ci) => {
        const isOpen = ci === cmOpenCat;
        const items = cat.subTopics.map(sub => {
          const active = sub.id === cmCurrentSubId ? ' active' : '';
          return `<div class="cm-subitem${active}" onclick="selectConcept('${sub.id}')">${sub.name}</div>`;
        }).join('');
        return `
          <div class="cm-cat${isOpen ? ' open' : ''}">
            <div class="cm-cat-header" onclick="toggleCMCat(${ci})">
              <span>${cat.mainTopic}</span>
              <span class="cm-cat-arrow">▶</span>
            </div>
            <div class="cm-sublist">${items}</div>
          </div>
        `;
      }).join('');
      document.getElementById('cm-sidebar').innerHTML = html;
    }

    function toggleCMCat(ci) {
      cmOpenCat = (cmOpenCat === ci) ? -1 : ci;
      renderCMSidebar();
    }

    function selectConcept(subId) {
      const result = getQuestionsForConcept(subId);
      if (!result.subTopic) return;
      cmCurrentSubId = subId;

      // 找出概念所屬的大類索引，自動展開
      const catIdx = concepts.findIndex(c => c.subTopics.some(s => s.id === subId));
      if (catIdx >= 0) cmOpenCat = catIdx;
      renderCMSidebar();

      // 隨機抽 5 題（混合題型）
      const all = [
        ...result.tf.map(q => ({ type: 'tf', data: q })),
        ...result.mc.map(q => ({ type: 'mc', data: q })),
        ...result.fill.map(q => ({ type: 'fill', data: q }))
      ];
      cmCurrentQs = pickRandomN(all, 5);
      cmAnswered = Array(cmCurrentQs.length).fill(false);
      cmCorrectFlags = Array(cmCurrentQs.length).fill(false);
      cmGuessFlags = Array(cmCurrentQs.length).fill(false);
      cmUserAnswers = Array(cmCurrentQs.length).fill(null);
      cmMCOrders = cmCurrentQs.map(item => {
        if (item.type !== 'mc') return null;
        const order = shuffleArray([0, 1, 2, 3]);
        return { order, mappedAns: order.indexOf(item.data.ans) };
      });

      renderCMContent(result.subTopic, all.length);
      // 滾動到頂部以便看到 Tip Card
      window.scrollTo({ top: document.querySelector('.cm-header').offsetTop - 10, behavior: 'smooth' });
    }

    function renderCMContent(sub, totalPoolSize) {
      const tipHTML = `
        <div class="cm-tip-card">
          <div class="cm-tip-title">💡 ${sub.name}</div>
          <div class="cm-tip-body">${sub.story}</div>
          <div class="cm-tip-pages">
            <span style="opacity:0.75;">對應法條：</span>
            ${sub.matchPages.map(p => `<span class="tag">${p}</span>`).join('')}
          </div>
        </div>
      `;

      if (cmCurrentQs.length === 0) {
        document.getElementById('cm-content').innerHTML = tipHTML + `
          <div class="cm-no-question">
            <div style="font-size:2em;margin-bottom:8px;opacity:0.5;">📭</div>
            這個概念目前沒有對應題目，但故事內容已可幫助你掌握重點。
          </div>
        `;
        return;
      }

      const quizHTML = `
        <div class="cm-quiz-header">
          <div class="cm-quiz-title">📝 隨堂驗收（${cmCurrentQs.length} / ${totalPoolSize} 題隨機抽）</div>
          <div style="display:flex;gap:10px;align-items:center;">
            <div class="cm-quiz-stats" id="cm-stats">作答 0 / ${cmCurrentQs.length}</div>
            <button class="cm-quiz-reshuffle" onclick="selectConcept('${sub.id}')">🔄 換 5 題</button>
          </div>
        </div>
        <div id="cm-questions"></div>
        <div id="cm-final" style="display:none;"></div>
      `;

      document.getElementById('cm-content').innerHTML = tipHTML + quizHTML;
      renderCMQuestions();
    }

    function renderCMQuestions() {
      const container = document.getElementById('cm-questions');
      const html = cmCurrentQs.map((item, i) => {
        if (item.type === 'tf') return cmCardTF(item.data, i);
        if (item.type === 'mc') return cmCardMC(item.data, i);
        return cmCardFill(item.data, i);
      }).join('');
      container.innerHTML = html;
    }

    function cmGuessBtn(i) {
      return `<button class="cm-guess-btn" id="cm-gbtn-${i}" onclick="cmToggleGuess(${i})" title="不確定？標記為「猜的」">🎲 猜的</button>`;
    }

    function cmCardTF(q, i) {
      return `
        <div class="cm-qcard" id="cm-card-${i}">
          <div class="cm-qcard-top">
            <div class="cm-qnum" id="cm-qnum-${i}">${i + 1}</div>
            <div class="cm-qtype-tag">是非</div>
            <div class="cm-qtext">${q.q}</div>
            ${cmGuessBtn(i)}
          </div>
          <div class="cm-choices">
            <button class="cm-cbtn" id="cm-tf-${i}-O" onclick="cmAnswerTF(${i}, 'O')">○ 正確</button>
            <button class="cm-cbtn" id="cm-tf-${i}-X" onclick="cmAnswerTF(${i}, 'X')">✕ 錯誤</button>
          </div>
          <div class="cm-result" id="cm-result-${i}"></div>
          <div class="cm-exp" id="cm-exp-${i}">${q.exp}${q.page ? ` <span class="law-ref">(${q.page})</span>` : ''}</div>
        </div>
      `;
    }

    function cmCardMC(q, i) {
      const { order } = cmMCOrders[i];
      const opts = order.map((origIdx, pos) => {
        const label = ['A','B','C','D'][pos];
        return `<button class="cm-mc-opt" id="cm-mc-${i}-${pos}" onclick="cmAnswerMC(${i}, ${pos})">${label}. ${q.options[origIdx]}</button>`;
      }).join('');
      return `
        <div class="cm-qcard" id="cm-card-${i}">
          <div class="cm-qcard-top">
            <div class="cm-qnum" id="cm-qnum-${i}">${i + 1}</div>
            <div class="cm-qtype-tag mc">選擇</div>
            <div class="cm-qtext">${q.q}</div>
            ${cmGuessBtn(i)}
          </div>
          <div class="cm-mc-options">${opts}</div>
          <div class="cm-result" id="cm-result-${i}"></div>
          <div class="cm-exp" id="cm-exp-${i}">${q.exp}${q.page ? ` <span class="law-ref">(${q.page})</span>` : ''}</div>
        </div>
      `;
    }

    function cmToggleGuess(i) {
      if (cmAnswered[i]) return;
      if (cmCurrentQs[i] && cmCurrentQs[i].type === 'fill') return;
      cmGuessFlags[i] = !cmGuessFlags[i];
      const btn = document.getElementById(`cm-gbtn-${i}`);
      if (btn) btn.classList.toggle('active', cmGuessFlags[i]);
      const card = document.getElementById(`cm-card-${i}`);
      if (card) card.classList.toggle('guessed', cmGuessFlags[i]);
    }

    function cmCardFill(q, i) {
      const inputs = q.blanks.map((_, bi) =>
        `<input class="cm-fill-input" id="cm-fill-${i}-${bi}" type="text" placeholder="第 ${bi + 1} 格">`
      ).join('');
      return `
        <div class="cm-qcard" id="cm-card-${i}">
          <div class="cm-qcard-top">
            <div class="cm-qnum" id="cm-qnum-${i}">${i + 1}</div>
            <div class="cm-qtype-tag fill">填空</div>
            <div class="cm-qtext">${q.q}</div>
          </div>
          <div class="cm-fill-row">
            ${inputs}
            <button class="cm-fill-btn" id="cm-fill-btn-${i}" onclick="cmAnswerFill(${i})">✅ 確認</button>
          </div>
          <div class="cm-result" id="cm-result-${i}"></div>
          <div class="cm-exp" id="cm-exp-${i}">${q.exp}${q.page ? ` <span class="law-ref">(${q.page})</span>` : ''}</div>
        </div>
      `;
    }

    function cmLockGuessBtn(i) {
      const g = document.getElementById(`cm-gbtn-${i}`);
      if (g) g.disabled = true;
    }

    function cmAnswerTF(i, chosen) {
      if (cmAnswered[i]) return;
      const q = cmCurrentQs[i].data;
      const correct = chosen === q.ans;
      cmAnswered[i] = true;
      cmCorrectFlags[i] = correct;
      cmUserAnswers[i] = chosen;

      trackAnswer('final-map', 'tf', i, chosen, correct, q.q);

      document.getElementById(`cm-tf-${i}-O`).disabled = true;
      document.getElementById(`cm-tf-${i}-X`).disabled = true;
      cmLockGuessBtn(i);
      if (correct) {
        document.getElementById(`cm-tf-${i}-${chosen}`).classList.add('picked-correct');
      } else {
        document.getElementById(`cm-tf-${i}-${chosen}`).classList.add('picked-wrong');
        document.getElementById(`cm-tf-${i}-${q.ans}`).classList.add('show-correct');
      }
      cmFinishQuestion(i, correct, q.ans === 'O' ? '○ 正確' : '✕ 錯誤');
    }

    function cmAnswerMC(i, pos) {
      if (cmAnswered[i]) return;
      const q = cmCurrentQs[i].data;
      const { mappedAns, order } = cmMCOrders[i];
      const correct = pos === mappedAns;
      cmAnswered[i] = true;
      cmCorrectFlags[i] = correct;
      cmUserAnswers[i] = pos;

      trackAnswer('final-map', 'mc', i, ['A','B','C','D'][pos], correct, q.q);

      for (let p = 0; p < 4; p++) {
        document.getElementById(`cm-mc-${i}-${p}`).disabled = true;
      }
      cmLockGuessBtn(i);
      if (correct) {
        document.getElementById(`cm-mc-${i}-${pos}`).classList.add('picked-correct');
      } else {
        document.getElementById(`cm-mc-${i}-${pos}`).classList.add('picked-wrong');
        document.getElementById(`cm-mc-${i}-${mappedAns}`).classList.add('show-correct');
      }
      cmFinishQuestion(i, correct, ['A','B','C','D'][mappedAns] + '. ' + q.options[order[mappedAns]]);
    }

    function cmAnswerFill(i) {
      if (cmAnswered[i]) return;
      const q = cmCurrentQs[i].data;
      let allRight = true;
      const userAnsParts = [];
      for (let bi = 0; bi < q.blanks.length; bi++) {
        const input = document.getElementById(`cm-fill-${i}-${bi}`);
        const v = input.value.trim();
        userAnsParts.push(v);
        const accept = q.blanks[bi].map(s => s.trim());
        const right = accept.includes(v);
        input.classList.add(right ? 'correct' : 'wrong');
        input.disabled = true;
        if (!right) allRight = false;
      }
      cmAnswered[i] = true;
      cmCorrectFlags[i] = allRight;
      cmUserAnswers[i] = userAnsParts;
      document.getElementById(`cm-fill-btn-${i}`).disabled = true;

      trackAnswer('final-map', 'fill', i, userAnsParts.join(' / '), allRight, q.q);
      cmFinishQuestion(i, allRight, q.answers.join(' / '));
    }

    function cmFinishQuestion(i, correct, correctText) {
      const card = document.getElementById(`cm-card-${i}`);
      card.classList.add(correct ? 'correct' : 'wrong');
      const result = document.getElementById(`cm-result-${i}`);
      result.className = 'cm-result show ' + (correct ? 'correct' : 'wrong');
      result.innerHTML = correct ? '✅ 答對了！' : `❌ 答錯了，正確答案：<b>${correctText}</b>`;
      document.getElementById(`cm-exp-${i}`).classList.add('show');

      const total = cmCurrentQs.length;
      const done = cmAnswered.filter(Boolean).length;
      const right = cmCorrectFlags.filter(Boolean).length;
      document.getElementById('cm-stats').textContent = `作答 ${done} / ${total}・答對 ${right}`;

      if (done === total) {
        const pct = Math.round(right / total * 100);
        let msg = '';
        if (pct === 100)      msg = '🏆 全對！這個概念你已經完全掌握。';
        else if (pct >= 80)   msg = '🎉 很不錯！再回頭看上面的故事鞏固一下細節。';
        else if (pct >= 60)   msg = '💪 還可以！建議重讀一次故事，再點「換 5 題」練手。';
        else                  msg = '📖 這概念還需要加強！故事再讀一次，搭配練習效果最好。';
        const finalDiv = document.getElementById('cm-final');
        finalDiv.style.display = 'block';
        let html = `<div class="cm-final-summary">本概念 ${total} 題答對 ${right} 題（${pct}%）<br>${msg}</div>`;
        const reviewCnt = cmCurrentQs.filter((_, j) => !cmCorrectFlags[j] || cmGuessFlags[j]).length;
        if (reviewCnt > 0) {
          html += `<div class="cm-export-wrap"><button class="cm-export-btn" onclick="cmExportWrongAnswers()">📋 匯出錯題＋猜題（共 ${reviewCnt} 題，複習用）</button></div>`;
        }
        finalDiv.innerHTML = html;
      }
    }

    /* ─── 概念地圖：匯出錯題＋猜題 ─── */
    function cmFindSubTopic(subId) {
      for (const cat of concepts) {
        for (const sub of cat.subTopics) {
          if (sub.id === subId) return { cat, sub };
        }
      }
      return null;
    }

    function cmCollectWrongItems() {
      const LABELS = ['A', 'B', 'C', 'D'];
      const items = [];
      cmCurrentQs.forEach((item, i) => {
        if (!cmAnswered[i]) return;
        const wrong = !cmCorrectFlags[i];
        const guessed = !!cmGuessFlags[i];
        if (!wrong && !guessed) return;
        const q = item.data;
        if (item.type === 'tf') {
          items.push({
            type: '是非題',
            tag: statusTag(wrong, guessed),
            page: q.page || '',
            questionLines: [`題目：${q.q}`],
            userAns: tfText(cmUserAnswers[i]),
            correctAns: tfText(q.ans),
            exp: q.exp
          });
        } else if (item.type === 'mc') {
          const { order, mappedAns } = cmMCOrders[i];
          const optionLines = order.map((origIdx, k) => `  ${LABELS[k]}. ${q.options[origIdx]}`);
          const ua = cmUserAnswers[i];
          items.push({
            type: '選擇題',
            tag: statusTag(wrong, guessed),
            page: q.page || '',
            questionLines: [`題目：${q.q}`, '選項：', ...optionLines],
            userAns: `${LABELS[ua]}. ${q.options[order[ua]]}`,
            correctAns: `${LABELS[mappedAns]}. ${q.options[q.ans]}`,
            exp: q.exp
          });
        } else {
          const inputs = cmUserAnswers[i] || [];
          const parts = q.q.split('___');
          let userFilled = '', correctFilled = '';
          parts.forEach((part, j) => {
            userFilled += part;
            correctFilled += part;
            if (j < parts.length - 1) {
              const v = (inputs[j] || '').trim();
              userFilled += `【${v || '（未填）'}】`;
              correctFilled += `【${q.answers[j] || ''}】`;
            }
          });
          items.push({
            type: '填空題',
            tag: '❌ 答錯',
            page: q.page || '',
            questionLines: [`題目：${q.q}`],
            userAns: userFilled,
            correctAns: correctFilled,
            exp: q.exp
          });
        }
      });
      return items;
    }

    function cmBuildExportText() {
      const found = cmFindSubTopic(cmCurrentSubId);
      const subName = found ? found.sub.name : '（未選）';
      const catName = found ? found.cat.mainTopic : '';
      const items = cmCollectWrongItems();
      const wrongOnly = items.filter(it => it.tag && it.tag.includes('答錯')).length;
      const guessOnly = items.filter(it => it.tag === '🎲 猜對（不確定）').length;
      const breakdown = wrongOnly && guessOnly
        ? `${wrongOnly} 題答錯 + ${guessOnly} 題猜對`
        : wrongOnly ? `${wrongOnly} 題答錯`
          : guessOnly ? `${guessOnly} 題猜對` : '';

      const header = [
        '═══════════════════════════════════════',
        '  廣告法規期末考 — 概念地圖錯題＋猜題清單',
        `  分類：${catName}`,
        `  概念：${subName}`,
        `  匯出時間：${formatNowForExport()}`,
        `  共 ${items.length} 題${breakdown ? `（${breakdown}）` : ''}`,
        '═══════════════════════════════════════',
        ''
      ].join('\n');

      if (items.length === 0) {
        return header + '\n🎉 本次沒有錯題也沒有猜題，完美達成！';
      }

      const body = items.map((it, k) => [
        `【第 ${k + 1} 題】${it.type}${it.tag ? '　' + it.tag : ''}${it.page ? '　法條：' + it.page : ''}`,
        ...it.questionLines,
        '',
        `我的作答：${it.userAns}`,
        `正確答案：${it.correctAns}`,
        '',
        '詳解：',
        htmlToPlainText(it.exp),
        '───────────────────────────────────────',
        ''
      ].join('\n')).join('\n');

      return header + '\n' + body;
    }

    function cmExportWrongAnswers() {
      document.getElementById('export-text').value = cmBuildExportText();
      document.getElementById('export-modal-mask').classList.add('show');
      document.getElementById('copy-status').classList.remove('show');
    }

    /* ─── 初始化 ─── */
    switchMode('learn');
    buildQuiz();
  </script>
