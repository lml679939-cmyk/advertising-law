    /* ─── 選擇題模式：建立 ─── */
    function buildMCQuiz() {
      const c = document.getElementById('quiz-container');
      c.innerHTML = '';
      mcOptionOrders = [];
      mcMappedAns = [];
      displayMCQuestions.forEach((q, i) => {
        const LABELS = ['A', 'B', 'C', 'D'];
        // 每題選項都重新洗牌，增加隨機感
        const order = shuffleArray([0, 1, 2, 3]);
        mcOptionOrders.push(order);
        mcMappedAns.push(order.indexOf(q.ans));

        const card = document.createElement('div');
        card.className = 'question-card';
        card.id = 'card-' + i;
        card.innerHTML = `
      <div class="question-top">
        <div class="q-num" id="qnum-${i}">${i + 1}</div>
        <div class="q-text">${q.q}</div>
      </div>
      <div class="mc-options-grid" id="opts-${i}">
        ${order.map((origIdx, j) => `
          <button class="mc-option-btn" id="mc-btn-${i}-${j}" onclick="answerMC(${i},${j})">
            <span class="mc-label">${LABELS[j]}</span>
            <span>${q.options[origIdx]}</span>
          </button>`).join('')}
      </div>
      <div class="choices-row" style="margin-top:8px">
        <button class="guess-btn" id="gbtn-${i}" onclick="toggleGuess(${i})">🎲 猜的</button>
        <button class="save-png-btn" id="savebtn-${i}" onclick="captureCard(${i})" title="複製為圖片"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="13" height="17" rx="2"/><path d="M2 7v13a2 2 0 0 0 2 2h11"/></svg></button>
        <span class="guess-label" id="glabel-${i}">⚠️ 我猜的</span>
      </div>
      <div class="result-row" id="rrow-${i}">
        <div class="result-badge" id="rbadge-${i}"></div>
      </div>
      <div class="explanation" id="exp-${i}">${q.exp}${q.page ? `<div class='page-ref'>📖 講義參考頁碼：<strong>${q.page}</strong></div>` : ''}</div>
    `;
        c.appendChild(card);
      });
    }

    /* ─── 選擇題模式：作答 ─── */
    function answerMC(idx, chosen) {
      const q = displayMCQuestions[idx];
      const correctMapped = mcMappedAns[idx];
      const prev = mcUserAnswers[idx];
      if (prev === chosen) return;

      if (prev !== null) {
        if (prev === correctMapped) mcCorrectCount--;
        else mcWrongCount--;
      }

      mcUserAnswers[idx] = chosen;
      const correct = chosen === correctMapped;
      trackAnswer('final-mc', 'mc', idx, chosen, correct, q.q);

      // 鎖定猜的按鈕
      const gbtn = document.getElementById('gbtn-' + idx);
      if (gbtn) { gbtn.disabled = true; }

      // 重設所有選項樣式
      q.options.forEach((_, j) => {
        document.getElementById(`mc-btn-${idx}-${j}`).className = 'mc-option-btn';
      });
      if (correct) {
        document.getElementById(`mc-btn-${idx}-${chosen}`).className = 'mc-option-btn mc-correct';
      } else {
        document.getElementById(`mc-btn-${idx}-${chosen}`).className = 'mc-option-btn mc-wrong';
        document.getElementById(`mc-btn-${idx}-${correctMapped}`).className = 'mc-option-btn mc-show-correct';
      }

      const rbadge = document.getElementById('rbadge-' + idx);
      const LABELS = ['A', 'B', 'C', 'D'];
      const isGuess = mcGuessFlags[idx];
      const guessTag = isGuess ? ' <span style="font-size:0.82em;opacity:0.8;">🎲 猜的</span>' : '';
      if (correct) {
        mcCorrectCount++;
        rbadge.className = 'result-badge correct-badge show';
        rbadge.innerHTML = '✅ 答對了！' + guessTag;
      } else {
        mcWrongCount++;
        rbadge.className = 'result-badge wrong-badge show';
        rbadge.innerHTML = `❌ 答錯了，正確答案是「${LABELS[correctMapped]}」` + guessTag;
      }
      document.getElementById('rrow-' + idx).classList.add('show');
      document.getElementById('exp-' + idx).classList.add('show');

      const card = document.getElementById('card-' + idx);
      card.classList.remove('correct-card', 'wrong-card');
      card.classList.add(correct ? 'correct-card' : 'wrong-card');
      const qnum = document.getElementById('qnum-' + idx);
      qnum.classList.remove('answered-correct', 'answered-wrong');
      qnum.classList.add(correct ? 'answered-correct' : 'answered-wrong');

      updateBar();
      if (mcUserAnswers.filter(a => a !== null).length === displayMCQuestions.length) showFinal();
    }

    /* ─── 填空題模式：建立 ─── */
    function buildFillQuiz() {
      const c = document.getElementById('quiz-container');
      c.innerHTML = '';
      displayFillQuestions.forEach((q, i) => {
        const parts = q.q.split('___');
        let qHtml = '';
        parts.forEach((part, j) => {
          qHtml += part;
          if (j < parts.length - 1) {
            const w = Math.max(90, Math.min(220, (q.answers[j] || '').length * 18));
            qHtml += `<input class="fill-input" id="fill-input-${i}-${j}" type="text" style="width:${w}px" placeholder="填入答案" onkeydown="if(event.key==='Enter'){checkFill(${i})}">`;
          }
        });
        const card = document.createElement('div');
        card.className = 'question-card';
        card.id = 'card-' + i;
        card.innerHTML = `
      <div class="question-top">
        <div class="q-num" id="qnum-${i}">${i + 1}</div>
        <div class="q-text" style="line-height:2">${qHtml}</div>
      </div>
      <div class="fill-check-row">
        <button class="btn-fill-check" id="fill-check-${i}" onclick="checkFill(${i})">✅ 確認答案</button>
        <button class="save-png-btn" id="savebtn-${i}" onclick="captureCard(${i})" title="複製為圖片"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="13" height="17" rx="2"/><path d="M2 7v13a2 2 0 0 0 2 2h11"/></svg></button>
      </div>
      <div class="result-row" id="rrow-${i}">
        <div class="result-badge" id="rbadge-${i}"></div>
      </div>
      <div class="explanation" id="exp-${i}">${q.exp}${q.page ? `<div class='page-ref'>📖 講義參考頁碼：<strong>${q.page}</strong></div>` : ''}</div>`;
        c.appendChild(card);
      });
    }

    /* ─── 填空題：確認答案 ─── */
    function normFill(s) {
      return s.trim().replace(/\s/g, '').replace(/％/g, '%').replace(/（/g, '(').replace(/）/g, ')').toLowerCase();
    }
    function checkFill(idx) {
      const q = displayFillQuestions[idx];
      const prev = fillUserAnswers[idx];
      let allOk = true;
      const res = q.blanks.map((accept, j) => {
        const inp = document.getElementById(`fill-input-${idx}-${j}`);
        if (!inp || !inp.value.trim()) { allOk = false; return false; }
        const ok = accept.some(a => normFill(a) === normFill(inp.value));
        if (!ok) allOk = false;
        return ok;
      });

      if (prev !== null) { if (prev) fillCorrectCount--; else fillWrongCount--; }
      fillUserAnswers[idx] = allOk;
      trackAnswer('final-fill', 'fill', idx, null, allOk, q.q);
      if (allOk) fillCorrectCount++; else fillWrongCount++;

      q.blanks.forEach((_, j) => {
        const inp = document.getElementById(`fill-input-${idx}-${j}`);
        inp.className = 'fill-input ' + (res[j] ? 'fill-correct' : 'fill-wrong');
      });

      const rbadge = document.getElementById('rbadge-' + idx);
      document.getElementById('rrow-' + idx).classList.add('show');
      document.getElementById('exp-' + idx).classList.add('show');
      const card = document.getElementById('card-' + idx);
      card.classList.remove('correct-card', 'wrong-card');
      card.classList.add(allOk ? 'correct-card' : 'wrong-card');
      const qnum = document.getElementById('qnum-' + idx);
      qnum.classList.remove('answered-correct', 'answered-wrong');
      qnum.classList.add(allOk ? 'answered-correct' : 'answered-wrong');

      const btn = document.getElementById(`fill-check-${idx}`);
      if (allOk) {
        rbadge.className = 'result-badge correct-badge show';
        rbadge.innerHTML = '✅ 完全正確！';
        btn.style.display = 'none';
      } else {
        const hints = q.blanks.map((_, j) => !res[j] ? `<strong>${q.answers[j]}</strong>` : null).filter(Boolean).join('、');
        rbadge.className = 'result-badge wrong-badge show';
        rbadge.innerHTML = `❌ 有填錯　正確答案：${hints}`;
        btn.textContent = '🔄 清空重試';
        btn.onclick = () => clearFill(idx);
      }

      updateBar();
      if (fillUserAnswers.filter(a => a !== null).length === displayFillQuestions.length) showFinal();
    }

    /* ─── 填空題：清空重試 ─── */
    function clearFill(idx) {
      const q = displayFillQuestions[idx];
      q.blanks.forEach((_, j) => {
        const inp = document.getElementById(`fill-input-${idx}-${j}`);
        inp.disabled = false; inp.value = ''; inp.className = 'fill-input';
      });
      if (fillUserAnswers[idx] !== null) {
        if (fillUserAnswers[idx]) fillCorrectCount--; else fillWrongCount--;
      }
      fillUserAnswers[idx] = null;
      document.getElementById('rrow-' + idx).classList.remove('show');
      document.getElementById('exp-' + idx).classList.remove('show');
      const card = document.getElementById('card-' + idx);
      card.classList.remove('correct-card', 'wrong-card');
      document.getElementById('qnum-' + idx).classList.remove('answered-correct', 'answered-wrong');
      const btn = document.getElementById(`fill-check-${idx}`);
      btn.style.display = ''; btn.textContent = '✅ 確認答案';
      btn.onclick = () => checkFill(idx);
      updateBar();
      document.getElementById(`fill-input-${idx}-0`).focus();
    }

    /* ─── 答題處理（依模式分流）─── */
    function handleAnswer(idx, chosen) {
      if (currentMode === 'learn') {
        answerLearn(idx, chosen);
      } else {
        answerClassic(idx, chosen);
      }
    }

    /* ─── 學習模式：即時回饋（可改答） ─── */
    function answerLearn(idx, chosen) {
      const q = displayQuestions[idx];
      const prev = userAnswers[idx];
      if (prev === chosen) return; // 點同一個不動

      // 調整計數（如果之前有答過）
      if (prev !== null) {
        if (prev === q.ans) correctCount--;
        else wrongCount--;
      }

      userAnswers[idx] = chosen;
      const correct = chosen === q.ans;
      trackAnswer('final-learn', 'tf', idx, chosen, correct, q.q);

      // 重設按鈕樣式（不 disable，讓使用者可以改答）
      document.getElementById('btn-O-' + idx).className = 'choice-btn';
      document.getElementById('btn-X-' + idx).className = 'choice-btn';
      if (correct) {
        document.getElementById('btn-' + chosen + '-' + idx).className = 'choice-btn selected-correct';
      } else {
        document.getElementById('btn-' + chosen + '-' + idx).className = 'choice-btn selected-wrong';
        document.getElementById('btn-' + q.ans + '-' + idx).className = 'choice-btn show-correct';
      }

      const rbadge = document.getElementById('rbadge-' + idx);
      const isGuess = guessFlags[idx];
      const guessTag = isGuess ? ' <span style="font-size:0.82em;opacity:0.8;">🎲 猜的</span>' : '';
      if (correct) {
        rbadge.className = 'result-badge correct-badge show';
        rbadge.innerHTML = '✅ 答對了！' + guessTag;
        correctCount++;
      } else {
        rbadge.className = 'result-badge wrong-badge show';
        rbadge.innerHTML = `❌ 答錯了，正確答案是「${q.ans === 'O' ? '○ 正確' : '✕ 錯誤'}」` + guessTag;
        wrongCount++;
      }
      document.getElementById('rrow-' + idx).classList.add('show');
      document.getElementById('exp-' + idx).classList.add('show');

      const card = document.getElementById('card-' + idx);
      card.classList.remove('correct-card', 'wrong-card');
      card.classList.add(correct ? 'correct-card' : 'wrong-card');
      const qnum = document.getElementById('qnum-' + idx);
      qnum.classList.remove('answered-correct', 'answered-wrong');
      qnum.classList.add(correct ? 'answered-correct' : 'answered-wrong');

      updateBar();
      if (userAnswers.filter(a => a !== null).length === displayQuestions.length) showFinal();
    }

    /* ─── 傳統模式：選擇不立即批改 ─── */
    function answerClassic(idx, chosen) {
      if (classicChecked) return;
      userAnswers[idx] = chosen;
      document.getElementById('btn-O-' + idx).className = 'choice-btn' + (chosen === 'O' ? ' selected-O' : '');
      document.getElementById('btn-X-' + idx).className = 'choice-btn' + (chosen === 'X' ? ' selected-X' : '');
      updateBar();
    }

    /* ─── 傳統模式：對答案 ─── */
    function checkAll() {
      if (currentMode !== 'classic') return;
      classicChecked = true;
      let score = 0, guessCorrect = 0, guessWrong = 0;

      displayQuestions.forEach((q, i) => {
        const card = document.getElementById('card-' + i);
        const rbadge = document.getElementById('rbadge-' + i);
        const isGuess = guessFlags[i];
        ['btn-O-' + i, 'btn-X-' + i, 'gbtn-' + i].forEach(id => {
          const el = document.getElementById(id);
          if (el) { el.style.cursor = 'default'; el.style.pointerEvents = 'none'; }
        });
        const guessTag = isGuess ? ' <span style="font-size:0.82em;opacity:0.85;">🎲 猜的</span>' : '';
        card.classList.remove('guessed-card');

        if (userAnswers[i] === null) {
          card.classList.add('unanswered');
          rbadge.className = 'result-badge wrong-badge show';
          rbadge.innerHTML = `⚠️ 未作答，正確答案：${q.ans === 'O' ? '○ 正確' : '✕ 錯誤'}${guessTag}`;
        } else if (userAnswers[i] === q.ans) {
          score++;
          if (isGuess) guessCorrect++;
          card.classList.add('correct-card');
          rbadge.className = 'result-badge correct-badge show';
          rbadge.innerHTML = `✅ 答對了！${guessTag}`;
        } else {
          if (isGuess) guessWrong++;
          card.classList.add('wrong-card');
          rbadge.className = 'result-badge wrong-badge show';
          rbadge.innerHTML = `❌ 答錯了，正確答案：${q.ans === 'O' ? '○ 正確' : '✕ 錯誤'}${guessTag}`;
        }
        trackAnswer('final-classic', 'tf', i, userAnswers[i], userAnswers[i] === q.ans, q.q);
        document.getElementById('rrow-' + i).classList.add('show');
        document.getElementById('exp-' + i).classList.add('show');
      });

      correctCount = score;
      wrongCount = displayQuestions.length - score;

      const totalGuess = guessFlags.filter(Boolean).length;
      document.getElementById('fs-guess-wrap').style.display = totalGuess > 0 ? '' : 'none';
      document.getElementById('fs-guess').textContent = guessCorrect;
      document.getElementById('fs-guessed-total').textContent = totalGuess;
      document.getElementById('final-hint').textContent = '詳解已全部顯示於各題目下方，可往上滾動複習';
      updateBar();
      showFinal();
    }

    /* ─── 猜題標記 ─── */
    function toggleGuess(idx) {
      if (currentMode === 'fill') return;
      if (currentMode === 'mc') {
        // 答題後不能再標記（已鎖定按鈕）
        if (mcUserAnswers[idx] !== null) return;
        mcGuessFlags[idx] = !mcGuessFlags[idx];
        document.getElementById('gbtn-' + idx).classList.toggle('active', mcGuessFlags[idx]);
        document.getElementById('glabel-' + idx).classList.toggle('show', mcGuessFlags[idx]);
        document.getElementById('card-' + idx).classList.toggle('guessed-card', mcGuessFlags[idx]);
        updateBar();
        return;
      }
      // 傳統模式：答題後或對答案後不能改；學習模式：任何時候都可以標記
      if (currentMode === 'classic') {
        if (userAnswers[idx] !== null || classicChecked) return;
      }
      guessFlags[idx] = !guessFlags[idx];
      document.getElementById('gbtn-' + idx).classList.toggle('active', guessFlags[idx]);
      document.getElementById('glabel-' + idx).classList.toggle('show', guessFlags[idx]);
      document.getElementById('card-' + idx).classList.toggle('guessed-card', guessFlags[idx]);
      updateBar();
    }


    /* ─── 進度條 ─── */
    function updateBar() {
      if (currentMode === 'story') return;
      let answered, total, corr, wrng, gCount = 0;
      if (currentMode === 'mc') {
        total = displayMCQuestions.length; answered = mcUserAnswers.filter(a => a !== null).length;
        corr = mcCorrectCount; wrng = mcWrongCount;
        gCount = mcGuessFlags.filter(Boolean).length;
      } else if (currentMode === 'fill') {
        total = displayFillQuestions.length; answered = fillUserAnswers.filter(a => a !== null).length;
        corr = fillCorrectCount; wrng = fillWrongCount;
      } else {
        total = displayQuestions.length; answered = userAnswers.filter(a => a !== null).length;
        corr = correctCount; wrng = wrongCount;
        gCount = guessFlags.filter(Boolean).length;
      }
      document.getElementById('total-count').textContent = total;
      document.getElementById('answered-count').textContent = answered;
      document.getElementById('correct-count').textContent = corr;
      document.getElementById('wrong-count').textContent = wrng;
      document.getElementById('progress-fill').style.width = (answered / total * 100) + '%';
      const chip = document.getElementById('guess-chip');
      chip.style.display = gCount > 0 ? 'inline' : 'none';
      document.getElementById('guess-count').textContent = gCount;
    }

    /* ─── 最終結果 ─── */
    function showFinal() {
      let score, total, retryCount = 0;
      const fb = document.getElementById('final-box');

      if (currentMode === 'mc') {
        total = displayMCQuestions.length; score = mcCorrectCount;
        const mcTotalGuess = mcGuessFlags.filter(Boolean).length;
        const mcGuessCorrect = displayMCQuestions.reduce((n, _, i) => n + (mcGuessFlags[i] && mcUserAnswers[i] === mcMappedAns[i] ? 1 : 0), 0);
        document.getElementById('fs-guess-wrap').style.display = mcTotalGuess > 0 ? '' : 'none';
        document.getElementById('fs-guess').textContent = mcGuessCorrect;
        document.getElementById('fs-guessed-total').textContent = mcTotalGuess;
        document.getElementById('final-hint').textContent = '詳解已全部顯示於各題目下方，可往上滾動複習';
        const p = score / total;
        document.getElementById('final-msg').textContent = p >= 0.9 ? '🏆 優秀！選擇題觀念已完全融會貫通！' : p >= 0.7 ? '🎯 良好！再加強幾個易混淆數字就滿分了！' : p >= 0.5 ? '📖 尚可！建議重點複習罰鍰金額與定義條文。' : '💪 加油！多對照判斷題詳解，釐清每個關鍵數字。';
        retryCount = displayMCQuestions.filter((_, i) => mcUserAnswers[i] !== mcMappedAns[i]).length;
      } else if (currentMode === 'fill') {
        total = displayFillQuestions.length; score = fillCorrectCount;
        document.getElementById('fs-guess-wrap').style.display = 'none';
        document.getElementById('final-hint').textContent = '詳解已全部顯示於各題目下方，可往上滾動複習';
        const p = score / total;
        document.getElementById('final-msg').textContent = p >= 0.9 ? '🏆 優秀！關鍵數字與法條細節已完全掌握！' : p >= 0.7 ? '🎯 良好！再多背幾個關鍵數字就完美了！' : p >= 0.5 ? '📖 尚可！建議重點複習容易填錯的數字條文。' : '💪 加油！多練幾次，關鍵數字一定能記住！';
        retryCount = displayFillQuestions.filter((_, i) => fillUserAnswers[i] !== true).length;
      } else {
        total = displayQuestions.length; score = correctCount;
        const totalGuess = guessFlags.filter(Boolean).length;
        const guessCorrect = displayQuestions.reduce((n, q, i) => n + (guessFlags[i] && userAnswers[i] === q.ans ? 1 : 0), 0);
        if (currentMode === 'learn' || currentMode === 'classic') {
          document.getElementById('fs-guess-wrap').style.display = totalGuess > 0 ? '' : 'none';
          document.getElementById('fs-guess').textContent = guessCorrect;
          document.getElementById('fs-guessed-total').textContent = totalGuess;
        }
        document.getElementById('final-hint').textContent = '詳解已全部顯示於各題目下方，可往上滾動複習';
        const p = score / total;
        document.getElementById('final-msg').textContent = p >= 0.9 ? '🏆 優秀！廣告法規熟悉度極高！' : p >= 0.7 ? '🎯 良好！繼續加強幾個易混淆條文就更完美了！' : p >= 0.5 ? '📖 尚可！建議重點複習罰則金額與定義條文。' : '💪 加油！多多複習法條原文，尤其注意數字與主詞。';
        if (currentMode === 'learn') retryCount = displayQuestions.filter((q, i) => userAnswers[i] !== q.ans || guessFlags[i]).length;
      }

      document.getElementById('final-score-text').textContent = `得分：${score} / ${total}`;
      document.getElementById('fs-correct').textContent = score;
      document.getElementById('fs-wrong').textContent = total - score;

      const retryWrap = document.getElementById('retry-wrap');
      const btnRetry = document.getElementById('btn-retry');
      if (retryCount > 0 && currentMode !== 'classic') {
        const label = currentMode === 'learn' ? '答錯＆猜的' : '答錯';
        btnRetry.textContent = `🔁 重新練習${label}題目（共 ${retryCount} 題）`;
        retryWrap.style.display = 'block';
      } else {
        retryWrap.style.display = 'none';
      }

      fb.style.display = 'block';
      fb.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    /* ─── 重置 ─── */
    function resetAll() {
      document.getElementById('final-box').style.display = 'none';
      if (currentMode === 'story') { initStoryMode(); return; }
      document.getElementById('answered-count').textContent = '0';
      document.getElementById('correct-count').textContent = '0';
      document.getElementById('wrong-count').textContent = '0';
      document.getElementById('progress-fill').style.width = '0%';
      document.getElementById('guess-chip').style.display = 'none';
      if (document.getElementById('retry-wrap')) document.getElementById('retry-wrap').style.display = 'none';

      if (currentMode === 'mc') {
        displayMCQuestions = shuffleEnabled ? shuffleArray([...activeMCQuestions]) : [...activeMCQuestions];
        mcUserAnswers = Array(displayMCQuestions.length).fill(null);
        mcGuessFlags = Array(displayMCQuestions.length).fill(false);
        mcOptionOrders = []; mcMappedAns = [];
        mcCorrectCount = 0; mcWrongCount = 0;
      } else if (currentMode === 'fill') {
        displayFillQuestions = shuffleEnabled ? shuffleArray([...activeFillQuestions]) : [...activeFillQuestions];
        fillUserAnswers = Array(displayFillQuestions.length).fill(null);
        fillCorrectCount = 0; fillWrongCount = 0;
      } else {
        displayQuestions = shuffleEnabled ? shuffleArray([...activeQuestions]) : [...activeQuestions];
        userAnswers = Array(TOTAL).fill(null);
        guessFlags = Array(TOTAL).fill(false);
        correctCount = 0; wrongCount = 0;
        classicChecked = false;
      }
      buildQuiz();
      updateBar();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    /* ─── 重新練習答錯題目 ─── */
    function retryWrong() {
      let retryList;
      if (currentMode === 'learn') {
        retryList = displayQuestions.filter((q, i) => userAnswers[i] !== q.ans || guessFlags[i]);
        if (shuffleEnabled) shuffleArray(retryList);
        displayQuestions = retryList;
        userAnswers = Array(retryList.length).fill(null);
        guessFlags = Array(retryList.length).fill(false);
        correctCount = 0; wrongCount = 0;
      } else if (currentMode === 'mc') {
        retryList = displayMCQuestions.filter((_, i) => mcUserAnswers[i] !== mcMappedAns[i] || mcGuessFlags[i]);
        if (shuffleEnabled) shuffleArray(retryList);
        displayMCQuestions = retryList;
        mcUserAnswers = Array(retryList.length).fill(null);
        mcGuessFlags = Array(retryList.length).fill(false);
        mcOptionOrders = []; mcMappedAns = [];
        mcCorrectCount = 0; mcWrongCount = 0;
      } else if (currentMode === 'fill') {
        retryList = displayFillQuestions.filter((_, i) => fillUserAnswers[i] !== true);
        if (shuffleEnabled) shuffleArray(retryList);
        displayFillQuestions = retryList;
        fillUserAnswers = Array(retryList.length).fill(null);
        fillCorrectCount = 0; fillWrongCount = 0;
      }
      if (!retryList || retryList.length === 0) return;
      document.getElementById('final-box').style.display = 'none';
      document.getElementById('answered-count').textContent = '0';
      document.getElementById('correct-count').textContent = '0';
      document.getElementById('wrong-count').textContent = '0';
      document.getElementById('progress-fill').style.width = '0%';
      document.getElementById('guess-chip').style.display = 'none';
      buildQuiz();
      updateBar();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    /* ══════════════════════════════════════════════════════════════

    const storyDay3 = { dayTitle: 'Day 3 ── 期末關卡（開發中）', daySubtitle: '菜鳥律師小廣的廣告法求生記', dayIntro: '期末關卡即將推出，敬請期待！', questions: [] };

    /* ── 狀態 ── */
    let storyState = { qIdx: 0, score: 0, hearts: 3, streak: 0, answered: false, wrongList: [] };

    /* 依角色名稱找對應資料，自動忽略「陳經理（驚慌失措）」這種括號補述 */
    function getCharacter(name) {
      if (!name) return null;
      const cleanName = name.replace(/[（(][^）)]*[）)]/g, '').trim();
      return storyCharacters[cleanName] || storyCharacters[name] || null;

    /* 依 setup 文字中的時間判斷背景漸層
       早上(藍天曙光) → 中午(暖金陽光) → 下午(午後藍天) → 傍晚(橘紅夕陽) → 夜晚(深藍夜空) */
    function getSceneBackground(setupText) {
      const t = setupText || '';
      if (/下午 5|傍晚|夜|晚/.test(t))
        return 'linear-gradient(170deg,#0a0a2e 0%,#1a1a4e 40%,#162447 70%,#0f3460 100%)';
      if (/下午 4/.test(t))
        return 'linear-gradient(170deg,#1a0533 0%,#8e1c4c 20%,#d45d2a 45%,#f39c12 70%,#ffd57e 100%)';
      if (/下午 [23]/.test(t))
        return 'linear-gradient(170deg,#1565c0 0%,#1976d2 25%,#42a5f5 55%,#bbdefb 85%,#e3f2fd 100%)';
      if (/中午|12:|午休|午餐/.test(t))
        return 'linear-gradient(170deg,#e65100 0%,#f57c00 20%,#ffa726 45%,#ffcc80 75%,#fff8e1 100%)';
      if (/早上|上午|9:|10:|11:/.test(t))
        return 'linear-gradient(170deg,#1a237e 0%,#283593 15%,#5c6bc0 40%,#90caf9 70%,#e3f2fd 100%)';
      return 'linear-gradient(170deg,#0a0a2e 0%,#16213e 50%,#0f3460 100%)';
    }
    const S_MAX_HEARTS = 5;
    const S_LABELS = ['A', 'B', 'C', 'D'];
    function sHearts(n) { return '❤️'.repeat(Math.max(0, Math.min(n, S_MAX_HEARTS))) + '🖤'.repeat(S_MAX_HEARTS - Math.max(0, Math.min(n, S_MAX_HEARTS))); }
    function sRand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    /* ── 初始化：顯示關卡選擇 ── */
    function initStoryMode() {
      const panel = document.getElementById('story-panel');

      /* 密碼鎖 */
      if (!isUnlocked) {
        panel.innerHTML = `
      <div class="story-day-header">
        <div style="font-size:0.8em;opacity:0.75;letter-spacing:2px;margin-bottom:4px;">${storyDay1.daySubtitle}</div>
        <div style="font-size:1.25em;font-weight:bold;letter-spacing:2px;">${storyDay1.dayTitle}</div>

        <div style="font-size:2.5em;margin-bottom:12px;">🔒</div>
        <div style="font-size:1.1em;font-weight:bold;color:#6c3483;margin-bottom:8px;">劇情模式限密碼解鎖者遊玩</div>
        <div style="font-size:0.88em;color:#7f8c8d;line-height:1.8;">請在網址後方加上密碼參數<br><code style="background:#f0e6f9;padding:2px 8px;border-radius:4px;color:#6c3483;">?key=（密碼）</code><br>解鎖後即可進入小廣的求生日常！</div>
      </div>`;
        return;
      }

      /* 關卡選擇畫面 */
      panel.innerHTML = `
    <div class="story-day-header">
      <div style="font-size:0.78em;opacity:0.75;letter-spacing:2px;margin-bottom:4px;">${storyDay1.daySubtitle}</div>
      <div style="font-size:1.2em;font-weight:bold;letter-spacing:2px;">⚖️ 選擇今日關卡</div>
    </div>
    <div style="padding:20px 16px;display:flex;flex-direction:column;gap:14px;max-width:480px;margin:0 auto;">
      <button class="story-day-select-btn" onclick="startStoryDay(storyDay1)">
        <div style="font-size:1.05em;font-weight:bold;margin-bottom:5px;">⚗️ Day 1 ── 藥廠客戶的緊急求助</div>
        <div style="font-size:0.82em;opacity:0.75;">藥事法・藥物廣告・罰則・釋字414 vs 744</div>
      </button>
      <button class="story-day-select-btn" onclick="startStoryDay(storyDay2)">
        <div style="font-size:1.05em;font-weight:bold;margin-bottom:5px;">📡 Day 2 ── 廣電法的試煉</div>
        <div style="font-size:0.82em;opacity:0.75;">廣播電視法・有線廣電法・衛星廣電法・置入 vs 贊助</div>
      </button>
      <button class="story-day-select-btn" onclick="startStoryDay(storyDay3)">
        <div style="font-size:1.05em;font-weight:bold;margin-bottom:5px;">💄 Day 3 ── 化粧品廣告的雷區</div>
        <div style="font-size:0.82em;opacity:0.75;">化粧品衛生安全管理法・虛偽誇大・醫療效能・釋字744</div>
      </button>
      <button class="story-day-select-btn" onclick="startStoryDay(storyDay4)">
        <div style="font-size:1.05em;font-weight:bold;margin-bottom:5px;">🛒 Day 4 ── 購物頻道的大混戰</div>
        <div style="font-size:0.82em;opacity:0.75;">衛星廣電法・消保法・NCC組織法・公平交易法・釋字364</div>
      </button>
    </div>`;
    }

    /* ── 開始指定關卡 ── */
    function startStoryDay(dayData) {
      currentDay = dayData;
      storyState = { qIdx: 0, score: 0, hearts: 3, streak: 0, answered: false, wrongList: [] };
      const panel = document.getElementById('story-panel');
      const dayNum = dayData === storyDay1 ? 1 : dayData === storyDay2 ? 2 : dayData === storyDay3 ? 3 : 4;
      const startLabel = dayNum === 1 ? '⚖️ 開始第一天上班！' : dayNum === 2 ? '📡 開始第二天上班！' : dayNum === 3 ? '💄 開始第三天上班！' : '🛒 開始第四天上班！';

      panel.innerHTML = `
    <div class="story-day-header">
      <div style="font-size:0.78em;opacity:0.75;letter-spacing:2px;margin-bottom:4px;">${dayData.daySubtitle}</div>
      <div style="font-size:1.2em;font-weight:bold;letter-spacing:2px;">${dayData.dayTitle}</div>
    </div>
    <div class="story-intro-box" id="story-intro">
      <div style="font-size:0.88em;color:rgba(255,215,180,0.9);white-space:pre-line;line-height:1.95;">${dayData.dayIntro}</div>
      <button class="story-next-btn" style="display:block;margin-top:16px;" onclick="storyDismissIntro()">${startLabel}</button>
    </div>
    <div id="story-game" style="display:none;">
      <div class="story-status-bar">
        <div>
          <div style="font-size:0.72em;color:rgba(255,215,180,0.6);font-weight:bold;margin-bottom:3px;">主任好感度</div>
          <div class="story-hearts" id="s-hearts">${sHearts(3)}</div>
        </div>
        <div style="text-align:center;">
          <div style="font-size:0.72em;color:rgba(255,215,180,0.6);font-weight:bold;margin-bottom:3px;">連對</div>
          <div class="story-streak" id="s-streak">－</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:0.72em;color:rgba(255,215,180,0.6);font-weight:bold;margin-bottom:3px;">進度</div>
          <div class="story-progress-text" id="s-progress">1 / ${dayData.questions.length}</div>
        </div>
      </div>
      <div class="story-command-strip">
        <button class="story-cmd-btn" onclick="storyCmd('sour')">🧊 酸酸講解</button>
        <button class="story-cmd-btn" onclick="storyCmd('rage')">😡 主任發飆</button>
        <button class="story-cmd-btn" onclick="storyCmd('end')">🏠 今天先到這裡</button>
      </div>
      <div id="s-extra" class="story-extra-box"></div>
      <div id="s-lucky" class="story-lucky-event"></div>
      <div id="s-content"></div>
    </div>
    <div id="s-end" class="story-end-panel"></div>`;
    }

    function storyDismissIntro() {
      document.getElementById('story-intro').style.display = 'none';
      document.getElementById('story-game').style.display = 'block';
      storyBuildScene(0);
    }

    /* ── 建立題目場景 ── */
    function storyBuildScene(idx) {
      const day = currentDay;
      if (idx >= day.questions.length) { storyShowEnd(); return; }
      const q = day.questions[idx];
      storyState.answered = false;

      document.getElementById('s-hearts').textContent = sHearts(storyState.hearts);
      document.getElementById('s-streak').textContent = storyState.streak >= 2 ? `🔥 ${storyState.streak}連對` : storyState.streak === 1 ? '🔥 1連對' : '－';
      document.getElementById('s-progress').textContent = `${idx + 1} / ${day.questions.length}`;
      document.getElementById('s-extra').style.display = 'none';
      document.getElementById('s-lucky').style.display = 'none';

      const btnArea = q.type === 'tf'
        ? `<div class="story-tf-buttons">
         <button class="story-tf-btn story-O" id="sbO" onclick="storyTF('O')">○ 正確</button>
         <button class="story-tf-btn story-X" id="sbX" onclick="storyTF('X')">✕ 錯誤</button>
       </div>`
        : `<div class="story-mc-options">${q.options.map((o, i) => `
         <button class="story-mc-btn" id="smc${i}" onclick="storyMC(${i})">
           <span class="story-mc-label">${S_LABELS[i]}</span><span>${o}</span>
         </button>`).join('')}</div>`;

      const char = getCharacter(q.client);
      const charColor = char ? char.color : '#9b59b6';
      const charAvatar = char ? char.avatar : '';
      const charTitle = char ? char.title : '';
      const bg = getSceneBackground(q.setup);

      const spriteHTML = charAvatar
        ? `<div class="story-vn-sprite">
         <img src="${charAvatar}" alt="${q.client}" onerror="this.parentElement.style.display='none'" />
       </div>`
        : '';
      const miniHTML = charAvatar
        ? `<div class="story-vn-mini"><img src="${charAvatar}" alt="" onerror="this.parentElement.style.display='none'"/></div>`
        : '';

      document.getElementById('s-content').innerHTML = `
    <div class="story-vn-stage">
      <div class="story-vn-bg" style="background:${bg}"></div>
      <div class="story-vn-particles">
        <div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div>
        <div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div>
        <div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div>
        <div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div>
      </div>
      <div class="story-vn-setup">${q.setup}</div>
      ${spriteHTML}
      <div class="story-vn-dbox">
        <div class="story-vn-namerow">
          ${miniHTML}
          <span class="story-vn-namebox" style="background:${charColor}">
            ${q.client}${charTitle ? `<span class="story-vn-title">${charTitle}</span>` : ''}
          </span>
        </div>
        <div class="story-vn-line">${q.clientLine}</div>
        <div class="story-vn-dbox-arrow"></div>
      </div>
    </div>
    <div class="story-q-card">
      <div class="story-q-label">⚖️ 法律判斷</div>
      <div class="story-q-text">${q.q}</div>
      ${btnArea}
    </div>
    <div class="story-reaction-box" id="s-react"></div>
    <button class="story-next-btn" id="s-next" onclick="storyNext()">
      ${idx + 1 < day.questions.length ? '▶ 下一題' : '📋 結算今日成績'}
    </button>`;
    }

    /* ── 作答 ── */
    function storyTF(choice) {
      if (storyState.answered) return;
      storyState.answered = true;
      const q = currentDay.questions[storyState.qIdx];
      trackAnswer('final-story', 'tf', storyState.qIdx, choice, choice === q.ans, q.q);
      ['sbO', 'sbX'].forEach(id => { const b = document.getElementById(id); if (b) { b.style.pointerEvents = 'none'; } });
      const winBtn = document.getElementById('sb' + q.ans);
      if (winBtn) winBtn.classList.add('sel');
      storyProcess(choice === q.ans, q);
    }

    function storyMC(opt) {
      if (storyState.answered) return;
      storyState.answered = true;
      const q = currentDay.questions[storyState.qIdx];
      trackAnswer('final-story', 'mc', storyState.qIdx, opt, opt === q.ans, q.q);
      for (let i = 0; i < q.options.length; i++) {
        const b = document.getElementById('smc' + i);
        if (!b) continue;
        b.style.pointerEvents = 'none';
        if (i === q.ans) b.classList.add('smc-correct');
        else if (i === opt) b.classList.add('smc-wrong');
      }
      storyProcess(opt === q.ans, q);
    }

    function storyProcess(ok, q) {
      if (ok) {
        storyState.score++;
        storyState.streak++;
        if (storyState.streak === 3) {
          storyState.hearts = Math.min(S_MAX_HEARTS, storyState.hearts + 1);
          const msgs = [
            '🎉 【幸運事件】阿肥端來咖啡：「學長！連對三題！拿鐵是我親手泡的！」',
            '🎉 【幸運事件】主任突然說：「表現不錯，下午可以早走五分鐘。」',
            '🎉 【幸運事件】酸酸難得說了句：「……今天狀態還可以。」（這大概是她能說出口最好的讚美了。）'
          ];
          const el = document.getElementById('s-lucky');
          el.textContent = sRand(msgs); el.style.display = 'block';
        }
      } else {
        storyState.streak = 0;
        storyState.hearts = Math.max(0, storyState.hearts - 1);
        storyState.wrongList.push({ no: storyState.qIdx + 1, q: q.q, ans: q.ans, type: q.type, options: q.options });
      }
      document.getElementById('s-hearts').textContent = sHearts(storyState.hearts);
      document.getElementById('s-streak').textContent = storyState.streak >= 2 ? `🔥 ${storyState.streak}連對` : storyState.streak === 1 ? '🔥 1連對' : '－';

      const badge = ok
        ? '✅ 答對了！'
        : `❌ 答錯了！正確答案：${q.type === 'tf' ? (q.ans === 'O' ? '○ 正確' : '✕ 錯誤') : S_LABELS[q.ans] + '. ' + q.options[q.ans]}`;
      const react = document.getElementById('s-react');
      react.className = 'story-reaction-box ' + (ok ? 'sreact-correct' : 'sreact-wrong');
      react.style.display = 'block';
      react.innerHTML = `
    <div class="story-reaction-badge">${badge}</div>
    <div class="story-reaction-line">${sRand(ok ? q.correctR : q.wrongR)}</div>
    <div class="story-exp-box">${q.exp}</div>`;
      document.getElementById('s-next').style.display = 'block';
      setTimeout(() => { react.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 100);
    }

    /* ── 特殊指令 ── */
    function storyCmd(cmd) {
      if (cmd === 'end') { storyShowEnd(true); return; }
      const q = currentDay.questions[storyState.qIdx];
      const box = document.getElementById('s-extra');
      box.style.display = 'block';
      if (cmd === 'sour') box.innerHTML = `<strong>🧊 林酸酸講解：</strong><br>${q.sour || '（酸酸今天不想開口。）'}`;
      if (cmd === 'rage') box.innerHTML = `<strong>😡 王鐵嘴主任發飆：</strong><br>${q.rage || '（主任今天難得沒發飆，珍惜吧。）'}`;
    }

    /* ── 下一題 ── */
    function storyNext() {
      storyState.qIdx++;
      storyBuildScene(storyState.qIdx);
      const game = document.getElementById('story-game');
      if (game) window.scrollTo({ top: game.offsetTop - 20, behavior: 'smooth' });
    }

    /* ── 結算 ── */
    function storyShowEnd(early = false) {
      const gameEl = document.getElementById('story-game');
      const introEl = document.getElementById('story-intro');
      if (gameEl) gameEl.style.display = 'none';
      if (introEl) introEl.style.display = 'none';
      const total = currentDay.questions.length;
      const score = storyState.score;
      const pct = score / total;
      const hearts = storyState.hearts;
      let verdict;
      if (pct >= 0.9) verdict = hearts >= 4 ? '🏆 主任要給你加薪！（才怪，但至少今天沒被開除，而且主任心情很好！）' : '🏆 優秀！今晚可以正常下班！';
      else if (pct >= 0.7) verdict = '🎯 還算能看的新人，至少沒讓事務所被客訴。繼續加油。';
      else if (pct >= 0.5) verdict = '📖 勉強沒被開除，但主任說你明天要寫三份反省書。';
      else verdict = '💀 王鐵嘴主任：「你確定你有法學院畢業嗎？！我要查你的畢業證書真偽！」';

      const recapHTML = storyState.wrongList.length > 0 ? `
    <div class="story-end-recap">
      <strong>📋 今日錯題回顧（酸酸毒舌版）：</strong><br><br>
      ${storyState.wrongList.map(w => `
        <div style="margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.15);">
          <span style="opacity:0.7;font-size:0.85em;">第 ${w.no} 題</span><br>${w.q}<br>
          <span style="color:#a9dfbf;">正確答案：${w.type === 'tf' ? (w.ans === 'O' ? '○ 正確' : '✕ 錯誤') : S_LABELS[w.ans] + '. ' + w.options[w.ans]}</span>
        </div>`).join('')}
    </div>` : '';

      const endEl = document.getElementById('s-end');
      endEl.style.display = 'block';
      const dayLabel = currentDay === storyDay1 ? 'Day 1' : currentDay === storyDay2 ? 'Day 2' : currentDay === storyDay3 ? 'Day 3' : 'Day 4';
      endEl.innerHTML = `
    <div class="story-end-title">${dayLabel} 結束！</div>
    ${early ? '<div style="font-size:0.82em;opacity:0.7;margin-bottom:10px;">（提前離場）</div>' : ''}
    <div class="story-end-score">得分：${score} / ${total}　${sHearts(hearts)}</div>
    <div class="story-end-verdict">${verdict}</div>
    ${recapHTML}
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
      <button class="story-restart-btn" onclick="startStoryDay(currentDay)">🔄 重新挑戰 ${dayLabel}</button>
      <button class="story-restart-btn" onclick="initStoryMode()">📋 選擇關卡</button>
    </div>`;
      endEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    /* ─── 複製題目為圖片到剪貼簿 ─── */
    function captureCard(idx) {
      const card = document.getElementById('card-' + idx);
      const btn = document.getElementById('savebtn-' + idx);
      if (!card) return;

      if (btn) btn.style.visibility = 'hidden';
      btn && btn.classList.add('saving');

      // 確保詳解可見
      const expEl = document.getElementById('exp-' + idx);
      const wasHidden = expEl && !expEl.classList.contains('show');
      if (wasHidden) expEl.classList.add('show');

      html2canvas(card, {
        backgroundColor: '#ffffff',
        scale: 2,
        useCORS: true,
        logging: false
      }).then(canvas => {
        canvas.toBlob(blob => {
          if (!blob) return;
          try {
            navigator.clipboard.write([
              new ClipboardItem({ 'image/png': blob })
            ]).then(() => {
              // 短暫閃綠色提示複製成功
              if (btn) {
                btn.style.visibility = '';
                btn.style.borderColor = '#27ae60';
                btn.style.color = '#27ae60';
                setTimeout(() => {
                  btn.style.borderColor = '';
                  btn.style.color = '';
                }, 1200);
              }
            }).catch(() => fallbackDownload(canvas, idx));
          } catch (e) { fallbackDownload(canvas, idx); }
        }, 'image/png');
      }).finally(() => {
        btn && btn.classList.remove('saving');
        if (wasHidden) expEl.classList.remove('show');
      });
    }
    function fallbackDownload(canvas, idx) {
      // 瀏覽器不支援剪貼簿時，顯示彈窗讓使用者右鍵複製
      const btn = document.getElementById('savebtn-' + idx);
      if (btn) btn.style.visibility = '';
      const dataUrl = canvas.toDataURL('image/png');

      // 建立遮罩
      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;';

      const hint = document.createElement('div');
      hint.textContent = '在圖片上按右鍵 → 複製圖片，即可貼到 Word';
      hint.style.cssText = 'color:#fff;font-size:1rem;background:#333;padding:8px 16px;border-radius:8px;';

      const img = document.createElement('img');
      img.src = dataUrl;
      img.style.cssText = 'max-width:90vw;max-height:75vh;border-radius:8px;box-shadow:0 4px 24px rgba(0,0,0,.5);';

      const closeBtn = document.createElement('button');
      closeBtn.textContent = '關閉';
      closeBtn.style.cssText = 'padding:8px 28px;border:none;border-radius:8px;background:#555;color:#fff;font-size:0.95rem;cursor:pointer;';
      closeBtn.onclick = () => document.body.removeChild(overlay);
      overlay.addEventListener('click', e => { if (e.target === overlay) document.body.removeChild(overlay); });

      overlay.append(hint, img, closeBtn);
      document.body.appendChild(overlay);
    }

    /* ─── 初始化 ─── */
    switchMode('learn');
    buildQuiz();
  </script>
  <footer style="text-align:center; padding: 24px 0 18px; font-size: 0.82em; color: #a0aab8;">
    © 2026 Yeah Yo.
  </footer>
</body>
